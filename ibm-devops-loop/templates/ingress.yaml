{{- if (.Capabilities.APIVersions.Has "getambassador.io/v2") }}
{{- if .Values.global.platform.emissary.ingressForwarding.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "devops-platform.componentFullname" (dict "componentName" "ingress" "context" .) }}
  labels: {{- include "devops-platform.labels" (dict "componentName" "ingress" "context" .) | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "{{ .Values.emissary.ingressForwarding.nginx.proxyBufferSize }}"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "{{ .Values.emissary.ingressForwarding.nginx.proxyBuffersNumber }}"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "{{ .Values.emissary.ingressForwarding.nginx.proxyBusyBuffersSize }}"
spec:
{{- if .Values.global.platform.emissary.ingressForwarding.className}}
  ingressClassName: {{ .Values.global.platform.emissary.ingressForwarding.className }}
{{- end }}
  rules:
  - host: {{ .Values.global.domain }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "devops-platform.componentFullname" (dict "componentName" "emissary-ingress" "context" .) }}
            port:
              number: {{ .Values.emissary.service.httpPort }}
{{- $certSecretName := .Values.global.ibmCertSecretName | default .Values.global.hclCertSecretName }}
  tls:
  - hosts:
    - {{ .Values.global.domain }}
{{- if $certSecretName }}
    secretName: {{ $certSecretName }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-platform.componentFullname" (dict "componentName" "emissary-ingress" "context" .) }}
  labels: {{- include "devops-platform.labels" (dict "componentName" "emissary-ingress" "context" .) | nindent 4 }}
spec: 
  type: ExternalName
  externalName: {{ .Values.emissary.service.name }}.{{ .Values.emissary.service.namespace }}.svc.cluster.local
{{- end }}
{{- end }}
