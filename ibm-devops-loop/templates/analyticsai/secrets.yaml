apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devops-platform.componentFullname" (dict "componentName" "analyticsai" "context" .) }}
  labels:
      {{- include "devops-platform.labels" (dict "componentName" "analyticsai" "context" .) | nindent 6 }}
type: Opaque
data:
{{- if .Values.analyticsai.existingPostgresqlPassword }}
  postgresql-password: {{ .Values.analyticsai.existingPostgresqlPassword | b64enc | quote }}
{{- else }}
  postgresql-password: {{ print (default .Release.Name (default .Values.global.passwordSeed .Values.passwordSeed)) "analyticsai-postgresql" | sha256sum | b64enc | quote }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
    app.kubernetes.io/name: analyticsai
    app.kubernetes.io/part-of: '{{ .Chart.Name }}'
    app.kubernetes.io/version: '{{ regexReplaceAll "-.*" .Chart.AppVersion "" }}'
    helm.sh/chart: '{{ .Chart.Name }}-{{ .Chart.Version }}'
  name: '{{ tpl (index .Values "ibm-devops-prod" "postgresql" "dbs" "analyticsai" "secret") . }}'
type: Opaque
data:
{{ include "devops-platform.postgresql-password-b64" (dict "context" . "existingPwd" (index .Values "analyticsai" "existingPostgresqlPassword") "passwordSeed" .Values.global.passwordSeed "componentName" "analyticsai") }}
---
apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
    app.kubernetes.io/name: analyticsai
    app.kubernetes.io/part-of: '{{ .Chart.Name }}'
    app.kubernetes.io/version: '{{ regexReplaceAll "-.*" .Chart.AppVersion "" }}'
    helm.sh/chart: '{{ .Chart.Name }}-{{ .Chart.Version }}'
  name: '{{ tpl (index .Values "analyticsai" "platform" "oidc" "clientSecret") . }}'
type: Opaque
data:
  oauth-client-secret: {{ print (default .Release.Name .Values.global.passwordSeed) "devopsanalyticsai-oauth-client-secret" | sha256sum | b64enc | quote }}
