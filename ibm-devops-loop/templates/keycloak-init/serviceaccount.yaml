{{- if index .Values "keycloak-init" "serviceAccount" "create" -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "devops-platform.serviceAccountName" (dict "componentName" "keycloak-init" "context" .) }} 
  labels:
    {{- include "devops-platform.labels" (dict "componentName" "keycloak-init" "context" .) | nindent 4 }}
    {{- with index .Values "keycloak-init" "serviceAccount" "labels" }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with index .Values "keycloak-init" "serviceAccount" "annotations" }}
  annotations :
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false 
{{- end }}
