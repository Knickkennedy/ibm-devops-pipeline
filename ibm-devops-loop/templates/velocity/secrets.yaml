apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
    app.kubernetes.io/name: ibm-ucv-prod
    app.kubernetes.io/part-of: '{{ .Chart.Name }}'
    app.kubernetes.io/version: '{{ regexReplaceAll "-.*" .Chart.AppVersion "" }}'
    helm.sh/chart: '{{ .Chart.Name }}-{{ .Chart.Version }}'
  name: '{{ tpl (index .Values "ibm-ucv-prod" "platform" "oidc" "clientSecret") . }}'
type: Opaque
data:
  oauth-client-secret: {{ print (default .Release.Name .Values.global.passwordSeed) "devopsvelocity-oauth-client-secret" | sha256sum | b64enc | quote }}
