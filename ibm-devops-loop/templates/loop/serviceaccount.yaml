{{- if .Values.loop.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "devops-platform.serviceAccountName" (dict "componentName" "loop" "context" .) }} 
  labels:
    {{- include "devops-platform.labels" (dict "componentName" "loop" "context" .) | nindent 4 }}
    {{- with .Values.loop.serviceAccount.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.loop.serviceAccount.annotations }}
  annotations :
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false 
{{- end }}
