{{- if include "testhub.rm.enabled" . }}
{{- if eq .Values.global.cmdKubectl "oc" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
    app.kubernetes.io/name: rm-cluster-monitoring-view
    app.kubernetes.io/part-of: '{{ .Chart.Name }}'
    app.kubernetes.io/version: '{{ regexReplaceAll "-.*" .Chart.AppVersion "" }}'
    helm.sh/chart: '{{ .Chart.Name }}-{{ .Chart.Version }}'
  name: '{{ .Release.Name }}-rm-cluster-monitoring-view-{{ .Release.Namespace }}'
roleRef:
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  name: cluster-monitoring-view
subjects:
- kind: ServiceAccount
  name: '{{ .Release.Name }}-rm'
  namespace: '{{ .Release.Namespace }}'
{{- end }}
{{- end }}
