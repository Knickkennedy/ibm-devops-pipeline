apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
    app.kubernetes.io/name: rm
    app.kubernetes.io/part-of: '{{ .Chart.Name }}'
    app.kubernetes.io/version: '{{ regexReplaceAll "-.*" .Chart.AppVersion "" }}'
    helm.sh/chart: '{{ .Chart.Name }}-{{ .Chart.Version }}'
  name: '{{ .Release.Name }}-rm'
type: Opaque
data:
{{- if include "testhub.rm.enabled" . }}
{{- if .Values.rm.existingOauthClientSecret }}
  oauth-client-secret: {{ .Values.rm.existingOauthClientSecret | b64enc | quote }}
{{- else }}
  oauth-client-secret: {{ print (default .Release.Name (default .Values.global.passwordSeed .Values.passwordSeed)) "rm-oauth-client-secret" | sha256sum | b64enc | quote }}
{{- end }}
{{- end }}
{{- if .Values.rm.existingPostgresqlPassword }}
  postgresql-password: {{ .Values.rm.existingPostgresqlPassword | b64enc | quote }}
{{- else }}
  postgresql-password: {{ print (default .Release.Name (default .Values.global.passwordSeed .Values.passwordSeed)) "rm-postgresql" | sha256sum | b64enc | quote }}
{{- end }}
