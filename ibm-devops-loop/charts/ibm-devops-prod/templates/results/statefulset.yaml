{{/* Define init container invoking liquibase. Must be included for each database. */}}
{{- define "testhub.results.liquibaseInitContainer" -}}
      - args:
          - upgrade-schema
        command:
          - java
          - '-jar'
          - /app/liquibase.jar
        env:
          - name: SPRING_DATASOURCE_PASSWORD
            valueFrom:
              secretKeyRef:
                key: postgresql-password
                name: '{{ .Release.Name }}-results'
          - name: {{ .envVar }}
            value: jdbc:postgresql://{{ .Release.Name }}-postgresql:5432/{{ .dbName }}
          - name: SPRING_DATASOURCE_USERNAME
            value: results
        image: '{{ (default (default .Values.imageRegistry .Values.global.imageRegistry) .Values.results.registry) }}/{{ regexReplaceAll .Values.imageRepoRegex .Values.results.image .Values.imageRepoRepl }}'
        imagePullPolicy: IfNotPresent
        name: liquibase-{{ .dbName }}
{{- if .Values.init.liquibase.resources }}
        resources: {{- toYaml .Values.init.liquibase.resources | nindent 10 }}
{{- end }}
{{- template "testhub.container.security-context" .Values.containerSecurityContext }}
{{- end -}}
{{- if include "testhub.results.enabled" . }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
    app.kubernetes.io/name: results
    app.kubernetes.io/part-of: '{{ .Chart.Name }}'
    app.kubernetes.io/version: '{{ regexReplaceAll "-.*" .Chart.AppVersion "" }}'
    helm.sh/chart: '{{ .Chart.Name }}-{{ .Chart.Version }}'
  name: '{{ .Release.Name }}-results'
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: '{{ .Release.Name }}'
      app.kubernetes.io/name: results
      app.kubernetes.io/part-of: '{{ .Chart.Name }}'
  serviceName: results
  template:
    metadata:
      annotations:
        productID: e3e180b0faae4301b54c5c9b37319e5c
        productMetric: FLOATING_USER
        productName: IBM Rational Test Automation Server Basic
        productVersion: "11.0.5"
        cloudpakName : IBM DevOps for IBM Cloud Paks
        cloudpakId : dedb7a9445a44fb88c927c1658243cd1
        cloudpakMetric : RESOURCE_UNIT
        productCloudpakRatio : "1:1"
        productChargedContainers : All
      labels:
        app.kubernetes.io/instance: '{{ .Release.Name }}'
        app.kubernetes.io/name: results
        app.kubernetes.io/part-of: '{{ .Chart.Name }}'
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64
{{- if .Values.priorityClassName }}
      priorityClassName: '{{ .Values.priorityClassName }}'
{{- end }}
      containers:
      - env:
        - name: INGRESS_DOMAIN
          value: '{{ .Values.global.domain }}'
        - name: OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: oauth-client-secret
              name: '{{ .Release.Name }}-results'
        - name: SPRING_APPLICATION_JSON
          value: >
            {
              "server": {
                "forward-headers-strategy": "NATIVE",
                "servlet": {
                  "context-path" : "{{ .Values.ingress.path }}"
                }
              },
              "spring": {
                "datasource": {
                  "username": "results"
                },
                "rabbitmq": {
                  "host": "{{ .Release.Name }}-rabbitmq",
                  "port": "5672",
                  "username": "user"
                },
                "security": {
                  "oauth2": {
                    "client": {
                      "registration": {
                        "internal": {
                          "authorization-grant-type": "client_credentials",
                          "client-id": "testserver-results",
                          "client-secret": "$(OAUTH_CLIENT_SECRET)",
                          "provider": "keycloak"
                        }
                      },
                      "provider": {
                        "keycloak": {
                          "token-uri": "https://$(INGRESS_DOMAIN){{ .Values.keycloak.path }}/realms/{{ .Values.keycloak.realm }}/protocol/openid-connect/token"
                        }
                      }
                    },
                    "resourceserver": {
                      "jwt": {
                        "jwk-set-uri": "https://$(INGRESS_DOMAIN){{ .Values.keycloak.path }}/realms/{{ .Values.keycloak.realm }}/protocol/openid-connect/certs"
                      }
                    }
                  }
                }
              }
            }
{{- if .Values.results.jaegerDashboard }}
        - name: RESULTS_JAEGER_UI_URL
          value: '{{ .Values.results.jaegerDashboard }}'
{{- end }}
        - name: RESULTS_LOG_DATASOURCE_URL
          value: jdbc:postgresql://{{ .Release.Name }}-postgresql:5432/testlog
        - name: RESULTS_COMMON_DATASOURCE_URL
          value: jdbc:postgresql://{{ .Release.Name }}-postgresql:5432/results
{{- if .Values.results.previewEnabled }}
        - name: RESULTS_LOG_FEATURES_VIEWERS_RAW
          value: "true"
{{- end }}
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: postgresql-password
              name: '{{ .Release.Name }}-results'
        - name: SPRING_PROFILES_ACTIVE
          value: prod
        - name: SPRING_RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              key: rabbitmq-password
              name: '{{ .Release.Name }}-rabbitmq'
{{- range $key, $value := .Values.results.extraEnv }}
        - name: {{ $key }}
          value: {{ tpl $value $ | quote }}
{{- end }}
        image: '{{ (default (default .Values.imageRegistry .Values.global.imageRegistry) .Values.results.registry) }}/{{ regexReplaceAll .Values.imageRepoRegex .Values.results.image .Values.imageRepoRepl }}'
        imagePullPolicy: IfNotPresent
        startupProbe:
          failureThreshold: 20
          httpGet:
            path: '{{ .Values.ingress.path }}/management/health'
            port: http
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: '{{ .Values.ingress.path }}/management/health'
            port: http
        readinessProbe:
          httpGet:
            path: '{{ .Values.ingress.path }}/management/health'
            port: http
        name: main
        ports:
        - containerPort: 8083
          name: http
          protocol: TCP
{{- if .Values.results.resources }}
        resources: {{- toYaml .Values.results.resources | nindent 10 }}
{{- end }}
{{- template "testhub.container.security-context" .Values.containerSecurityContext }}
        volumeMounts:
{{- template "testhub.volumeMounts.trust-store" $ }}
        - mountPath: /workspace
          name: data
        - mountPath: /tmp
          name: results-tmp
{{- if include "testhub.ibmImagePullSecret" . }}
      imagePullSecrets:
      - name: '{{ include "testhub.ibmImagePullSecret" . }}'
{{- end }}
      initContainers:
{{- template "testhub.initContainers.trust-store" $ }}
      - name: keycloak
        command:
        - sh
        - -ec
        - |
          ./wait.sh $KEYCLOAK_URL/realms/$REALM_NAME/
          ./client-create.sh
        env:
{{- template "testhub.container.keycloak-init-sh-env" $ }}
        - name: CLIENT_ID
          value: testserver-results
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: oauth-client-secret
              name: '{{ .Release.Name }}-results'
{{- template "testhub.container.keycloak-init-sh-trailer" $ }}
{{- template "testhub.initContainers.pg-isready" (merge (dict "dbName" "results") .) }}
      {{ template "testhub.results.liquibaseInitContainer" (merge (dict "envVar" "RESULTS_COMMON_DATASOURCE_URL" "dbName" "results") .) }}
      {{ template "testhub.results.liquibaseInitContainer" (merge (dict "envVar" "RESULTS_LOG_DATASOURCE_URL" "dbName" "testlog") .) }}
      hostIPC: false
      hostNetwork: false
      hostPID: false
{{- template "testhub.pod.security-context" $ }}
      serviceAccountName: '{{ .Release.Name }}-results'
      volumes:
      - name: results-tmp
        emptyDir: {}
{{- template "testhub.volumes.trust-store" $ }}
{{- template "testhub.volumes.keycloak-init-sh" $ }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
{{- if .Values.global.persistence.rwoStorageClass }}
      storageClassName: '{{ .Values.global.persistence.rwoStorageClass }}'
{{- end }}
      resources: #storage
        requests:
          storage: 8Gi
{{- end }}
