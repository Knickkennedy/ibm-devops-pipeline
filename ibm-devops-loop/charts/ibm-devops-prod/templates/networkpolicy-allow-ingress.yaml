{{- if .Values.networkPolicy.enabled }}
{{- if .Values.networkPolicy.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
    app.kubernetes.io/name: allow-ingress
    app.kubernetes.io/part-of: '{{ .Chart.Name }}'
    app.kubernetes.io/version: '{{ regexReplaceAll "-.*" .Chart.AppVersion "" }}'
    helm.sh/chart: '{{ .Chart.Name }}-{{ .Chart.Version }}'
  name: '{{ .Release.Name }}-allow-ingress'
spec:
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          {{ .Values.networkPolicy.ingress.namespaceLabel }}: '{{ .Values.networkPolicy.ingress.namespaceValue }}'
{{- if .Values.networkPolicy.ingress.podLabel }}
      podSelector:
        matchLabels:
          {{ .Values.networkPolicy.ingress.podLabel }}: '{{ .Values.networkPolicy.ingress.podValue }}'
{{- end }}
  podSelector: {}
{{- end }}
{{- end }}
