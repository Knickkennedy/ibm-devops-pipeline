apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
    app.kubernetes.io/name: extensions
    app.kubernetes.io/part-of: '{{ .Chart.Name }}'
    app.kubernetes.io/version: '{{ regexReplaceAll "-.*" .Chart.AppVersion "" }}'
    helm.sh/chart: '{{ .Chart.Name }}-{{ .Chart.Version }}'
  name: '{{ .Release.Name }}-extensions'
type: Opaque
data:
{{- if include "testhub.extensions.enabled" . }}
{{- if (or (or (or (or (or (or (or (or (or .Values.extensions.jmeter.enabled .Values.extensions.junit.enabled) .Values.extensions.postman.enabled) .Values.extensions.codesweep.enabled) .Values.extensions.script.enabled) .Values.extensions.azure.enabled) .Values.extensions.etm.enabled) .Values.extensions.jira.enabled) .Values.extensions.plan.enabled) .Values.extensions.ai.enabled)}}
{{- if .Values.extensions.existingOauthClientSecret }}
  oauth-client-secret: {{ .Values.extensions.existingOauthClientSecret | b64enc | quote }}
{{- else }}
  oauth-client-secret: {{ print (default .Release.Name (default .Values.global.passwordSeed .Values.passwordSeed)) "extensions-oauth-client-secret" | sha256sum | b64enc | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- if .Values.extensions.existingPostgresqlPassword }}
  postgresql-password: {{ .Values.extensions.existingPostgresqlPassword | b64enc | quote }}
{{- else }}
  postgresql-password: {{ print (default .Release.Name (default .Values.global.passwordSeed .Values.passwordSeed)) "extensions-postgresql" | sha256sum | b64enc | quote }}
{{- end }}
