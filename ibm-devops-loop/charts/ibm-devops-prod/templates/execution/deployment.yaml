{{- if include "testhub.execution.enabled" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
    app.kubernetes.io/name: execution
    app.kubernetes.io/part-of: '{{ .Chart.Name }}'
    app.kubernetes.io/version: '{{ regexReplaceAll "-.*" .Chart.AppVersion "" }}'
    helm.sh/chart: '{{ .Chart.Name }}-{{ .Chart.Version }}'
  name: '{{ .Release.Name }}-execution'
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app.kubernetes.io/instance: '{{ .Release.Name }}'
      app.kubernetes.io/name: execution
      app.kubernetes.io/part-of: '{{ .Chart.Name }}'
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        checksum/config: '{{ include (print $.Template.BasePath "/execution/configmap.yaml") . | sha256sum }}'
        productID: e3e180b0faae4301b54c5c9b37319e5c
        productMetric: FLOATING_USER
        productName: IBM Rational Test Automation Server Basic
        productVersion: "11.0.5"
        cloudpakName : IBM DevOps for IBM Cloud Paks
        cloudpakId : dedb7a9445a44fb88c927c1658243cd1
        cloudpakMetric : RESOURCE_UNIT
        productCloudpakRatio : "1:1"
        productChargedContainers : All
      labels:
        app.kubernetes.io/instance: '{{ .Release.Name }}'
        app.kubernetes.io/name: execution
        app.kubernetes.io/part-of: '{{ .Chart.Name }}'
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64
{{- if .Values.priorityClassName }}
      priorityClassName: '{{ .Values.priorityClassName }}'
{{- end }}
      containers:
      - env:
        - name: CURRENT_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: CURRENT_POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: EXECUTION_ANNOTATIONS
          value: |
            productID: e3e180b0faae4301b54c5c9b37319e5c
            productMetric: FLOATING_USER
            productName: IBM Rational Test Automation Server Basic
            productVersion: "11.0.5"
            cloudpakName : IBM DevOps for IBM Cloud Paks
            cloudpakId : dedb7a9445a44fb88c927c1658243cd1
            cloudpakMetric : RESOURCE_UNIT
            productCloudpakRatio : "1:1"
            productChargedContainers : All
        - name: EXECUTION_CONTAINER_PREFIX
          value: testhub_EC_
        - name: EXECUTION_LABELS
          value: |
            app.kubernetes.io/instance: '{{ .Release.Name }}'
            app.kubernetes.io/managed-by: '{{ .Release.Name }}.{{ .Release.Namespace }}'
            app.kubernetes.io/part-of: 'execution'
        - name: EXECUTION_LAUNCH_NAMESPACE
          value: '{{ .Release.Namespace }}'
        - name: EXECUTION_NETWORK
          value: testhub_default
{{- if .Values.execution.nodeSelector }}
        - name: EXECUTION_NODE_SELECTOR
          value: |
{{ toYaml .Values.execution.nodeSelector | indent 12 }}
{{- end }}
{{- if .Values.execution.toleration }}
        - name: EXECUTION_TOLERATION
          value: |
{{ toYaml .Values.execution.toleration | indent 12 }}
{{- end }}
        - name: INGRESS_DOMAIN
          value: '{{ .Values.global.domain }}'
        - name: INGRESS_HOST_PATTERN
          value: '{{ tpl .Values.execution.ingress.hostPattern $ }}'
        - name: JAVA_OPTS
          value: -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8
        - name: OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: oauth-client-secret
              name: '{{ .Release.Name }}-execution'
        - name: SPRING_APPLICATION_JSON
          value: >
            {
              "server": {
                "forward-headers-strategy": "NATIVE",
                "servlet": {
                  "context-path" : "{{ .Values.ingress.path }}"
                }
              },
              "spring": {
                "datasource": {
                  "url": "jdbc:postgresql://{{ .Release.Name }}-postgresql:5432/execution",
                  "username": "execution"
                },
                "rabbitmq": {
                  "host": "{{ .Release.Name }}-rabbitmq",
                  "port": "5672",
                  "username": "user"
                },
                "security": {
                  "oauth2": {
                    "client": {
                      "registration": {
                        "internal": {
                          "authorization-grant-type": "client_credentials",
                          "client-id": "testserver-execution",
                          "client-secret": "$(OAUTH_CLIENT_SECRET)",
                          "provider": "keycloak"
                        }
                      },
                      "provider": {
                        "keycloak": {
                          "token-uri": "https://$(INGRESS_DOMAIN){{ .Values.keycloak.path }}/realms/{{ .Values.keycloak.realm }}/protocol/openid-connect/token"
                        }
                      }
                    },
                    "resourceserver": {
                      "jwt": {
                        "jwk-set-uri": "https://$(INGRESS_DOMAIN){{ .Values.keycloak.path }}/realms/{{ .Values.keycloak.realm }}/protocol/openid-connect/certs"
                      }
                    }
                  }
                }
              }
            }
{{- if .Values.results.jaegerAgent }}
        - name: JAEGER_AGENT_HOST
          value: '{{ .Values.results.jaegerAgent }}'
{{- end }}
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: postgresql-password
              name: '{{ .Release.Name }}-execution'
        - name: SPRING_PROFILES_ACTIVE
          value: prod,swagger
        - name: SPRING_RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              key: rabbitmq-password
              name: '{{ .Release.Name }}-rabbitmq'
        - name: USERLIBS_VOLUME_CLAIM
          value: data-{{ .Release.Name }}-userlibs-0
{{- range $key, $value := .Values.execution.extraEnv }}
        - name: {{ $key }}
          value: {{ tpl $value $ | quote }}
{{- end }}
        image: '{{ (default (default .Values.imageRegistry .Values.global.imageRegistry) .Values.execution.registry) }}/{{ regexReplaceAll .Values.imageRepoRegex .Values.execution.image .Values.imageRepoRepl }}'
        imagePullPolicy: IfNotPresent
        startupProbe:
          failureThreshold: 20
          httpGet:
            path: '{{ .Values.ingress.path }}/management/health'
            port: http
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: '{{ .Values.ingress.path }}/management/health'
            port: http
        readinessProbe:
          httpGet:
            path: '{{ .Values.ingress.path }}/management/health'
            port: http
        name: main
        ports:
        - containerPort: 8281
          name: http
          protocol: TCP
{{- if .Values.execution.resources }}
        resources: {{- toYaml .Values.execution.resources | nindent 10 }}
{{- end }}
{{- template "testhub.container.security-context" .Values.containerSecurityContext }}
        volumeMounts:
{{- template "testhub.volumeMounts.kube-api-access" }}
        - mountPath: /tmp
          name: execution-tmp
        - mountPath: /execution/inventory.yml
          name: config
          subPath: inventory.yml
        - mountPath: /cpsdata
          name: data
        - mountPath: /extlibs/EXEC
          name: extlibs
          subPath: execution-ext
{{- if (or (or (or (or (or .Values.extensions.jmeter.enabled .Values.extensions.postman.enabled) .Values.extensions.script.enabled) .Values.extensions.junit.enabled) .Values.extensions.codesweep.enabled) .Values.extensions.script.enabled) }}
        - mountPath: /internal-ext
          name: internal-ext
{{- end }}
{{- if .Values.extensions.jmeter.enabled }}
        - mountPath: /execution/jmeter-extensibility.properties
          name: jmeter-config
          subPath: jmeter-extensibility.properties
{{- end }}
{{- if .Values.extensions.postman.enabled }}
        - mountPath: /execution/postman-extensibility.properties
          name: postman-config
          subPath: postman-extensibility.properties
{{- end }}
{{- if .Values.extensions.junit.enabled }}
        - mountPath: /execution/junit-extensibility.properties
          name: junit-config
          subPath: junit-extensibility.properties
{{- end }}
{{- if .Values.extensions.codesweep.enabled }}
        - mountPath: /execution/codesweep-extensibility.properties
          name: codesweep-config
          subPath: codesweep-extensibility.properties
{{- end }}
{{- if .Values.extensions.script.enabled }}
        - mountPath: /execution/script-extensibility.properties
          name: script-config
          subPath: script-extensibility.properties
{{- end }}
{{- template "testhub.volumeMounts.trust-store" $ }}
{{- if include "testhub.ibmImagePullSecret" . }}
      imagePullSecrets:
      - name: '{{ include "testhub.ibmImagePullSecret" . }}'
{{- end }}
      initContainers:
{{- template "testhub.initContainers.trust-store" $ }}
      - name: keycloak
        command:
        - sh
        - -ec
        - |
          ./wait.sh $KEYCLOAK_URL/realms/$REALM_NAME/
          ./client-create.sh
        env:
{{- template "testhub.container.keycloak-init-sh-env" $ }}
        - name: CLIENT_ID
          value: testserver-execution
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: oauth-client-secret
              name: '{{ .Release.Name }}-execution'
{{- template "testhub.container.keycloak-init-sh-trailer" $ }}
{{- template "testhub.initContainers.pg-isready" (merge (dict "dbName" "execution") .) }}
{{- template "testhub.initContainers.liquibase-update" (merge (dict "svc" "execution" "dbName" "execution") .) }}
{{- if .Values.extensions.jmeter.enabled }}
{{- template "testhub.initContainers.add-plugin" (merge (dict "plugin" "jmeter" "host" "exec" "pluginImage" "extensions") .) }}
{{- end }}
{{- if .Values.extensions.postman.enabled }}
{{- template "testhub.initContainers.add-plugin" (merge (dict "plugin" "postman" "host" "exec" "pluginImage" "extensions") .) }}
{{- end }}
{{- if .Values.extensions.junit.enabled }}
{{- template "testhub.initContainers.add-plugin" (merge (dict "plugin" "junit" "host" "exec" "pluginImage" "extensions") .) }}
{{- end }}
{{- if .Values.extensions.codesweep.enabled }}
{{- template "testhub.initContainers.add-plugin" (merge (dict "plugin" "codesweep" "host" "exec" "pluginImage" "extensions") .) }}
{{- end }}
{{- if .Values.extensions.script.enabled }}
{{- template "testhub.initContainers.add-plugin" (merge (dict "plugin" "script" "host" "exec" "pluginImage" "extensions") .) }}
{{- end }}
      hostIPC: false
      hostNetwork: false
      hostPID: false
{{- template "testhub.pod.security-context" $ }}
      serviceAccountName: '{{ .Release.Name }}-execution'
      volumes:
{{- template "testhub.volumes.kube-api-access" }}
      - configMap:
          name: '{{ .Release.Name }}-execution'
        name: config
      - name: execution-tmp
        emptyDir: {}
      - emptyDir: {}
        name: data
      - name: extlibs
        persistentVolumeClaim:
          claimName: data-{{ .Release.Name }}-userlibs-0
{{- if (or (or (or (or (or .Values.extensions.jmeter.enabled) .Values.extensions.postman.enabled) .Values.extensions.junit.enabled) .Values.extensions.codesweep.enabled) .Values.extensions.script.enabled) }}
      - emptyDir: {}
        name: internal-ext
{{- end }}
{{- if .Values.extensions.jmeter.enabled }}
      - configMap:
          name: '{{ .Release.Name }}-execution'
        name: jmeter-config
{{- end }}
{{- if .Values.extensions.postman.enabled }}
      - configMap:
          name: '{{ .Release.Name }}-execution'
        name: postman-config
{{- end }}
{{- if .Values.extensions.junit.enabled }}
      - configMap:
          name: '{{ .Release.Name }}-execution'
        name: junit-config
{{- end }}
{{- if .Values.extensions.codesweep.enabled }}
      - configMap:
          name: '{{ .Release.Name }}-execution'
        name: codesweep-config
{{- end }}
{{- if .Values.extensions.script.enabled }}
      - configMap:
          name: '{{ .Release.Name }}-execution'
        name: script-config
{{- end }}
{{- template "testhub.volumes.trust-store" $ }}
{{- template "testhub.volumes.keycloak-init-sh" $ }}
{{- end }}
