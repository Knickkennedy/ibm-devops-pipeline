{{- if include "testhub.tests.enabled" . }}
apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation
  labels:
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
    app.kubernetes.io/name: test-suite
    app.kubernetes.io/part-of: '{{ .Chart.Name }}'
    app.kubernetes.io/version: '{{ regexReplaceAll "-.*" .Chart.AppVersion "" }}'
    helm.sh/chart: '{{ .Chart.Name }}-{{ .Chart.Version }}'
  name: '{{ .Release.Name }}-test-suite'
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 300
  template:
    metadata:
      annotations:
        productID: e3e180b0faae4301b54c5c9b37319e5c
        productMetric: FLOATING_USER
        productName: IBM Rational Test Automation Server Basic
        productVersion: "11.0.5"
        cloudpakName : IBM DevOps for IBM Cloud Paks
        cloudpakId : dedb7a9445a44fb88c927c1658243cd1
        cloudpakMetric : RESOURCE_UNIT
        productCloudpakRatio : "1:1"
        productChargedContainers : All
      labels:
        app.kubernetes.io/instance: '{{ .Release.Name }}'
        app.kubernetes.io/managed-by: '{{ .Release.Service }}'
        app.kubernetes.io/name: test-suite
        app.kubernetes.io/part-of: '{{ .Chart.Name }}'
        app.kubernetes.io/version: '{{ regexReplaceAll "-.*" .Chart.AppVersion "" }}'
        helm.sh/chart: '{{ .Chart.Name }}-{{ .Chart.Version }}'
        wait-for: 'false'
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64
{{- if .Values.execution.priorityClassName }}
      priorityClassName: '{{ .Values.execution.priorityClassName }}'
{{- end }}
      containers:
      - name: main
        workingDir: /workspace
        command:
        - bash
        - -c
        - |
          export ENV_DEPLOYMENT_URL=https://$INGRESS_DOMAIN
          export ENV_DEPLOYMENT_PATH="{{ .Values.ingress.path }}"
          export ENV__DEPLOYMENT_REFRESH_TOKEN=$(cat /token/refresh-token.txt)

          echo token used:
          echo "$ENV__DEPLOYMENT_REFRESH_TOKEN" | cut -d. -f 2 | base64 -d 2>/dev/null || true
          echo
          echo contents of workspace:
          ls -la

          exec /entrypoint.sh {{ .Values.tests.main.command }}
        env:
        - name: INGRESS_DOMAIN
          value: '{{ .Values.global.domain }}'
{{- range $key, $value := .Values.tests.main.extraEnv }}
        - name: {{ $key }}
          value: {{ tpl $value $ | quote }}
{{- end }}
        image: '{{ (default (default .Values.imageRegistry .Values.global.imageRegistry) .Values.script.registry) }}/{{ regexReplaceAll .Values.imageRepoRegex .Values.script.image .Values.imageRepoRepl }}'
        imagePullPolicy: '{{ .Values.execution.enginePullPolicy }}'
{{- if .Values.tests.main.resources }}
        resources: {{- toYaml .Values.tests.main.resources | nindent 10 }}
{{- end }}
{{- template "testhub.container.security-context" (mergeOverwrite .Values.containerSecurityContext (dict "readOnlyRootFilesystem" false) ) }}
        volumeMounts:
        - name: token
          mountPath: /token
        - name: src
          mountPath: /workspace
        - name: src-modules
          mountPath: /workspace/modules
        - name: src-tests
          mountPath: /workspace/tests
{{- if include "testhub.ibmImagePullSecret" . }}
      imagePullSecrets:
      - name: '{{ include "testhub.ibmImagePullSecret" . }}'
{{- end }}
      initContainers:
{{- if .Values.tests.pull.api }}
      - name: pull-api
        command:
        - sh
        - -c
        - echo pulled
        image: '{{ (default (default .Values.imageRegistry .Values.global.imageRegistry) .Values.extensions.api.registry) }}/{{ regexReplaceAll .Values.imageRepoRegex .Values.extensions.api.image .Values.imageRepoRepl }}'
        imagePullPolicy: '{{ .Values.execution.enginePullPolicy }}'
{{- if .Values.init.resources }}
        resources: {{- toYaml .Values.init.resources | nindent 10 }}
{{- end }}
{{- template "testhub.container.security-context" .Values.containerSecurityContext }}
{{- if include "testhub.ibmImagePullSecret" . }}
      imagePullSecrets:
      - name: '{{ include "testhub.ibmImagePullSecret" . }}'
{{- end }}
{{- end }}
      - name: refresh-token
        command:
        - bash
        - -c
        - |
          set -ex
          if [ -s /usr/share/pki/ingress/ca.crt ]; then
            openssl s_client -connect $INGRESS_DOMAIN:443 -CAfile /usr/share/pki/ingress/ca.crt
          fi
          echo "check that we can talk to keycloak. expect 200"
          curl -Lsw'%{http_code}' $CAFILE -o/dev/null "$KEYCLOAK_URL"

          . admin-token.sh

          USER_NAME_FIRST=build
          USER_NAME_LAST=verification
          USER_NAME=$USER_NAME_FIRST.$USER_NAME_LAST

          . user-create.sh
          . user-offline-token.sh

          echo "$USER_TOKEN" >/token/refresh-token.txt
        env:
{{- template "testhub.container.keycloak-init-sh-env" $ }}
        - name: CLIENT_ID
          value: testserver
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: oauth-client-secret
              name: '{{ .Release.Name }}-core'
{{- template "testhub.container.keycloak-init-sh-trailer" $ }}
        - mountPath: /token
          name: token
      - name: license
        command:
        - bash
        - -c
        - |
          echo "check that we can talk to ingress. expect 200"
          curl -sw'%{http_code}' $CAFILE -o/dev/null "https://$INGRESS_DOMAIN{{ .Values.ingress.path }}/"

          . admin-token.sh

          USER_NAME_FIRST=build.admin
          USER_NAME_LAST=verification
          USER_NAME=$USER_NAME_FIRST.$USER_NAME_LAST
          USER_GROUPS='["Admins"]'

          . user-create.sh
          . user-token.sh

          echo enable BVT mode
          curl -si $CAFILE -X PUT "https://$INGRESS_DOMAIN{{ .Values.ingress.path }}/rest/licensing/configuration/" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            -H "Authorization: Bearer $USER_TOKEN" \
            -d '{ "bvtMode": "true" }'

          . user-delete.sh
        env:
{{- template "testhub.container.keycloak-init-sh-env" $ }}
        - name: CLIENT_ID
          value: testserver
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: oauth-client-secret
              name: '{{ .Release.Name }}-core'
{{- template "testhub.container.keycloak-init-sh-trailer" $ }}
      restartPolicy: Never
      hostIPC: false
      hostNetwork: false
      hostPID: false
{{- template "testhub.pod.security-context" $ }}
      serviceAccountName: '{{ .Release.Name }}-engine'
      volumes:
      - name: ingress
        secret:
          optional: {{ ternary "false" "true" .Values.ingress.cert.selfSigned }}
          secretName: '{{ ternary .Values.global.ibmCertSecretName "none" .Values.ingress.cert.selfSigned }}'
{{- template "testhub.volumes.keycloak-init-sh" $ }}
      - name: token
        emptyDir: {}
      - name: src
        configMap:
          name: '{{ .Release.Name }}-test-src'
      - name: src-modules
        configMap:
          name: '{{ .Release.Name }}-test-src-modules'
      - name: src-tests
        configMap:
          name: '{{ .Release.Name }}-test-src-tests'
  ttlSecondsAfterFinished: 3600
{{- end }}
