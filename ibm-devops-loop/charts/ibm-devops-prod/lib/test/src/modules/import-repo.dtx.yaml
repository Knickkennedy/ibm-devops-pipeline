configuration:
  vars:
    PROJECT_URL:
      modifier: out
    REPO_URL:
      modifier: out
    DELETE_PROJECT: {}
    DEPLOYMENT_URL: {}
    DEPLOYMENT_PATH: {}
    _DEPLOYMENT_REFRESH_TOKEN: {}
steps:
  - run: create-project.dtx.yaml
  - send:
      note: import repo
      transport: ../auth.dtt.yaml
      url: ${DEPLOYMENT_URL}${PROJECT_URL}/repositories/
      request:
        fields:
          - headers/content-type:
              - val: application/json
          - content:
              - val: '{"auth_type":"HTTPS","uri":"https://github.com/ibm-rtvs/build-verify.git"}'
      response:
        includes:
          - import-repo.dtm.yaml#RESPONSE
        fields:
          - headers/location:
              - var: REPO_URL
  - while:
      note: wait for repo to sync
      condition: |-
        'cloned' != REPO_STATE
      steps:
        - pause: 1s
        - send:
            note: update repo state
            transport: ../auth.dtt.yaml
            url: ${DEPLOYMENT_URL}${REPO_URL}
            response:
              includes:
                - import-repo.dtm.yaml#RESPONSE
