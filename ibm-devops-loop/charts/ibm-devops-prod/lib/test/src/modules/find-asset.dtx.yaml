configuration:
  vars:
    DEPLOYMENT_URL: {}
    DEPLOYMENT_PATH: {}
    _DEPLOYMENT_REFRESH_TOKEN: {}
    PROJECT_URL: {}
    REPO_BRANCH: {}
    REPO_COMMIT:
      expr: 'null'
      type: js
    ASSET_ID:
      modifier: out
steps:
  - send:
      note: find asset
      transport: ../auth.dtt.yaml
      url: ${DEPLOYMENT_URL}${PROJECT_URL}/assets/
      request:
        fields:
          - url/query:
              - fields:
                  - revision:
                      - var: REPO_BRANCH
                  - desktopProjectId:
                      - val: 00000170-e2ab-e791-0001-41cd2abccd04
                  - name:
                      - val: All
                  - requestedVersion:
                      - optional: {}
                      - var: REPO_COMMIT
      response:
        fields:
          - content/content/0/id:
              - var: ASSET_ID
