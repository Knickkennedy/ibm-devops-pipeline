{{- if not (((.Values.global).platform).enabled) }}
apiVersion: v1
kind: Service
metadata:
  name: rcl-client
  labels:
    {{- include "ucv.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  sessionAffinity: None
  ports:
    - name: rcl-client-port
      protocol: TCP
      port: 4567
      targetPort: 4567
  selector:
    {{- $vars := merge (dict) . -}}
    {{- $_ := set $vars "ucvService" "rcl-client" -}}
    {{- include "ucv.selector" $vars | nindent 4 }}
{{- end }}
