apiVersion: apps/v1
kind: Deployment
metadata:
  name: background-processor
  labels:
    {{- include "ucv.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- $vars := merge (dict) . -}}
      {{- $_ := set $vars "ucvService" "background-processor" -}}
      {{- include "ucv.selector" $vars | nindent 6 }}
  template:
    metadata:
      labels:
        {{- $vars := merge (dict) . -}}
        {{- $_ := set $vars "ucvService" "background-processor" -}}
        {{- include "ucv.specTemplateLabels" $vars | nindent 8 }}
      annotations:
        {{- include "ucv.productAnnotations" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccountName }}
      hostNetwork: false
      hostPID: false
      hostIPC: false
      imagePullSecrets:
        {{- include "ucv.imagePullSecrets" . | nindent 8 }}
      affinity:
        {{- $vars := merge (dict) . -}}
        {{- $_ := set $vars "ucvWorkloadClass" "background" -}}
        {{- include "ucv.nodeAffinity" $vars | nindent 8 }}
      initContainers:
        - name: init-reporting-consumer
          image:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvImageRegistry" .Values.imageRegistry.redhat -}}
            {{- $_ := set $vars "ucvImageName" "ubi9/ubi-minimal" -}}
            {{- $_ := set $vars "ucvImageTag" "latest" -}}
            {{- include "ucv.external.image" $vars | nindent 12 }}
          imagePullPolicy: IfNotPresent
          resources:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvService" "init-container" -}}
            {{- include "ucv.resources" $vars | nindent 12 }}
          securityContext:
            {{- include "ucv.securityContext" . | nindent 12 }}
          command: ['sh', '-c', 'until [ "$(curl -s http://reporting-consumer:6004/ready)" == "ready" ]; do echo waiting for reporting-consumer; sleep 5; done;']
        - name: init-application-api
          image:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvImageRegistry" .Values.imageRegistry.redhat -}}
            {{- $_ := set $vars "ucvImageName" "ubi9/ubi-minimal" -}}
            {{- $_ := set $vars "ucvImageTag" "latest" -}}
            {{- include "ucv.external.image" $vars | nindent 12 }}
          imagePullPolicy: IfNotPresent
          resources:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvService" "init-container" -}}
            {{- include "ucv.resources" $vars | nindent 12 }}
          securityContext:
            {{- include "ucv.securityContext" . | nindent 12 }}
          command: ['sh', '-c', 'until [ "$(curl -s http://application-api:3499/ready)" == "ready" ]; do echo waiting for application-api; sleep 5; done;']
        - name: init-continuous-release-consumer
          image:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvImageRegistry" .Values.imageRegistry.redhat -}}
            {{- $_ := set $vars "ucvImageName" "ubi9/ubi-minimal" -}}
            {{- $_ := set $vars "ucvImageTag" "latest" -}}
            {{- include "ucv.external.image" $vars | nindent 12 }}
          imagePullPolicy: IfNotPresent
          resources:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvService" "init-container" -}}
            {{- include "ucv.resources" $vars | nindent 12 }}
          securityContext:
            {{- include "ucv.securityContext" . | nindent 12 }}
          command: ['sh', '-c', 'until [ "$(curl -s http://continuous-release-consumer:3411/ready)" == "ready" ]; do echo waiting for continuous-release-consumer; sleep 5; done;']
        - name: init-multi-app-pipeline-api
          image:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvImageRegistry" .Values.imageRegistry.redhat -}}
            {{- $_ := set $vars "ucvImageName" "ubi9/ubi-minimal" -}}
            {{- $_ := set $vars "ucvImageTag" "latest" -}}
            {{- include "ucv.external.image" $vars | nindent 12 }}
          imagePullPolicy: IfNotPresent
          resources:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvService" "init-container" -}}
            {{- include "ucv.resources" $vars | nindent 12 }}
          securityContext:
            {{- include "ucv.securityContext" . | nindent 12 }}
          command: ['sh', '-c', 'until [ "$(curl -s http://multi-app-pipeline-api:9090/ready)" == "ready" ]; do echo waiting for multi-app-pipeline-api; sleep 5; done;']
        - name: init-security-api
          image:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvImageRegistry" .Values.imageRegistry.redhat -}}
            {{- $_ := set $vars "ucvImageName" "ubi9/ubi-minimal" -}}
            {{- $_ := set $vars "ucvImageTag" "latest" -}}
            {{- include "ucv.external.image" $vars | nindent 12 }}
          imagePullPolicy: IfNotPresent
          resources:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvService" "init-container" -}}
            {{- include "ucv.resources" $vars | nindent 12 }}
          securityContext:
            {{- include "ucv.securityContext" . | nindent 12 }}
          command: ['sh', '-c', 'until [ "$(curl -s http://security-api:3911/ready)" == "ready" ]; do echo waiting for security-api; sleep 5; done;']
      containers:
        - name: release-events-api
          image:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvImageRegistry" .Values.imageRegistry.velocityRegistry -}}
            {{- $_ := set $vars "ucvImageRegistryPath" .Values.imageRegistry.velocityPath -}}
            {{- $_ := set $vars "ucvImageName" "release-events-api" -}}
            {{- $_ := set $vars "ucvImageTag" "5.1.6.6" -}}
            {{- include "ucv.image" $vars | nindent 12 }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: NODE_OPTIONS
              {{- $vars := merge (dict) . -}}
              {{- $_ := set $vars "ucvService" "background-processor" -}}
              {{- include "ucv.maxOldSpaceSize" $vars | nindent 14 }}
            - name: PORT
              value: '8080'
            - name: MONGO_DB
              value: release-events
            - name: BACKGROUND_JOB_ONLY
              value: 'true'
            - name: LOG_LEVEL
              value: {{ .Values.loglevel }}
            - name: MONGO_URL
              {{- include "ucv.mongoUrl" . | nindent 14 }}
            - name: SECURITY_API_URL
              value: http://security-api:3911
            - name: SECURITY_API_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: apiToken
            - name: JWT_CIPHER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: cipherToken
            - name: JWT_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: hmacKey
            - name: DEPLOY_PLAN_API_URL
              value: {{ printf "http://continuous-release-ui:3000%sdeploymentPlans" (ternary "/" (printf "/%s/" (.Values.ingress.path | trimPrefix "/" | trimSuffix "/")) (eq .Values.ingress.path "/")) }}
            - name: DEPLOY_PLAN_API_CIPHER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: cipherToken
            - name: DEPLOY_PLAN_API_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: hmacKey
            - name: BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: apiToken
            - name: RABBITMQ_HOST
              value: velocity-rabbitmq
            - name: RABBITMQ_PORT
              value: '5672'
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.rabbit }}
                  key: user
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.rabbit }}
                  key: password
            - name: MAP_API_URL
              value: http://multi-app-pipeline-api:9090
            - name: MAP_API_PATH
              value: /v1/multi-app-pipeline
            - name: MAP_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: apiToken
            - name: REPORTING_CONSUMER_API_URL
              value: http://reporting-consumer:6004
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: '0'
            - name: APP_API_URL
              value: http://application-api:3499
            - name: LICENSE
              value: {{ required "You must accept license." .Values.license }}
            - name: QUEUE_ANALYTICS_SERVICE_MESSAGE
              value: 'false'
            - name: OPEN_TELEMETRY
              value: {{ .Values.openTelemetryEnabled }}
            - name: OPEN_TELEMETRY_LOG_LEVEL
              value: {{ .Values.openTelemetryLogLevel }}
            - name: OPEN_TELEMETRY_COLLECTOR
              value: {{ index .Values "opentelemetry-collector" "fullnameOverride" }}
          resources:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvService" "background-processor" -}}
            {{- include "ucv.resources" $vars | nindent 12 }}
          securityContext:
            {{- include "ucv.securityContext" . | nindent 12 }}
          livenessProbe:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvService" "background-processor" -}}
            {{- $_ := set $vars "ucvLivenessPort" 8080 -}}
            {{- include "ucv.livenessProbe" $vars | nindent 12 }}
          readinessProbe:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvService" "background-processor" -}}
            {{- $_ := set $vars "ucvReadinessPort" 8080 -}}
            {{- include "ucv.readinessProbe" $vars | nindent 12 }}
          {{- include "ucv.mongoVolumeMounts" . | nindent 10 }}
      {{- include "ucv.mongoVolumes" . | nindent 6 }}
