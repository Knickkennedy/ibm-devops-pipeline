apiVersion: v1
kind: Service
metadata:
  name: background-processor
  labels:
    {{- include "ucv.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  sessionAffinity: None
  ports:
    - name: background-processor-port
      protocol: TCP
      port: 8081
      targetPort: 8080
  selector:
    {{- $vars := merge (dict) . -}}
    {{- $_ := set $vars "ucvService" "background-processor" -}}
    {{- include "ucv.selector" $vars | nindent 4 }}
