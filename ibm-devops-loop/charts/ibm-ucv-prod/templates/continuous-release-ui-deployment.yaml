apiVersion: apps/v1
kind: Deployment
metadata:
  name: continuous-release-ui
  labels:
    {{- include "ucv.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- $vars := merge (dict) . -}}
      {{- $_ := set $vars "ucvService" "continuous-release-ui" -}}
      {{- include "ucv.selector" $vars | nindent 6 }}
  template:
    metadata:
      labels:
        {{- $vars := merge (dict) . -}}
        {{- $_ := set $vars "ucvService" "continuous-release-ui" -}}
        {{- include "ucv.specTemplateLabels" $vars | nindent 8 }}
      annotations:
        {{- include "ucv.productAnnotations" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccountName }}
      hostNetwork: false
      hostPID: false
      hostIPC: false
      imagePullSecrets:
        {{- include "ucv.imagePullSecrets" . | nindent 8 }}
      affinity:
        {{- $vars := merge (dict) . -}}
        {{- $_ := set $vars "ucvWorkloadClass" "transactional" -}}
        {{- include "ucv.nodeAffinity" $vars | nindent 8 }}
      containers:
        - name: continuous-release-ui
          image:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvImageRegistry" .Values.imageRegistry.velocityRegistry -}}
            {{- $_ := set $vars "ucvImageRegistryPath" .Values.imageRegistry.velocityPath -}}
            {{- $_ := set $vars "ucvImageName" "continuous-release-ui" -}}
            {{- $_ := set $vars "ucvImageTag" "5.1.6.6" -}}
            {{- include "ucv.image" $vars | nindent 12 }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_OPTIONS
              {{- $vars := merge (dict) . -}}
              {{- $_ := set $vars "ucvService" "continuous-release-ui" -}}
              {{- include "ucv.maxOldSpaceSize" $vars | nindent 14 }}
            - name: PORT
              value: '3000'
            - name: ROOT_URL
              value: {{ template "root.url.cr" . }}
            - name: LOG_LEVEL
              value: {{ .Values.loglevel }}
            - name: MONGO_URL
              {{- include "ucv.mongoUrl" . | nindent 14 }}
            - name: MONGO_DB
              value: 'velocity'
            - name: OPEN_TELEMETRY
              value: {{ .Values.openTelemetryEnabled }}
            - name: OPEN_TELEMETRY_LOG_LEVEL
              value: {{ .Values.openTelemetryLogLevel }}
            - name: OPEN_TELEMETRY_COLLECTOR
              value: {{ index .Values "opentelemetry-collector" "fullnameOverride" }}
            - name: MONGO_CONNECTION_OPTIONS
              value: '{
                "maxPoolSize": 10
              }'
            - name: RABBITMQ_HOST
              value: velocity-rabbitmq
            - name: RABBITMQ_PORT
              value: '5672'
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.rabbit }}
                  key: user
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.rabbit }}
                  key: password
            - name: SECURITY_API_URL
              value: http://security-api:3911/api
            - name: SECURITY_API_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: apiToken
            - name: APP_API_URL
              value: http://application-api:3499
            - name: APP_API_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: apiToken
            - name: MONTI_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.montiApm }}
                  key: appId
                  optional: true
            - name: MONTI_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.montiApm }}
                  key: apiToken
                  optional: true
            - name: RELEASE_API_URL
              value: http://release-events-api:8080/graphql
            - name: RELEASE_API_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: apiToken
            - name: MAP_API_URL
              value: http://multi-app-pipeline-api:9090/v1/multi-app-pipeline/graphql
            - name: MAP_API_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: apiToken
            - name: JWT_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: hmacKey
            - name: CR_CIPHER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: cipherToken
            - name: CR_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: hmacKey
            - name: CONNECT_URL
              value: http://reporting-consumer:6004
            - name: CONNECT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: apiToken
            - name: REPORTING_CONSUMER_API_URL
              value: http://reporting-consumer:6004
            - name: REPORTING_CONSUMER_API_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tokens }}
                  key: apiToken
            - name: AUTH_TOKEN_URL
              value: {{ .Values.authtokenurl }}
            - name: DRA_API_URL
              value: {{ .Values.draapiurl }}
            - name: TOOL_CHAINS_URL
              value: {{ .Values.toolchainsurl }}
            - name: DEVOPS_MESSAGE_STORE_API
              value: {{ .Values.devopsmessagestoreapi }}
            - name: COLLECTION_LOCK_TIMEOUT
              value: '10000'
            - name: METEOR_SETTINGS
              value: '{
                "public": {
                  "requireAuth": true,
                  "securityAuthUrl": "{{ template "root.url.securityAuth" . }}",
                  "SecurityApi": "http://security-api:3911",
                  "disconnectTimeSec": 5,
                  "version": "{{ .Chart.Version }}",
                  "marketingVersion": "{{ .Values.marketingVersion }}",
                  "platformPath": "{{ ((.Values.global).platform).path }}",
                  "contextPath": "{{ (.Values.ingress).path }}",
                  "features": {
                    "SlackTask": false,
                    "PipelineV2Task": false,
                    "EmailNotifications": true,
                    "EmailTask": true,
                    "RunAnotherPlanTask": true,
                    "Approvals": true,
                    "ApprovalTask": true,
                    "ServiceNowTask": true,
                    "JenkinsTask": true
                  }
                }
              }'
          resources:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvService" "continuous-release-ui" -}}
            {{- include "ucv.resources" $vars | nindent 12 }}
          securityContext:
            {{- include "ucv.securityContext" . | nindent 12 }}
          livenessProbe:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvService" "continuous-release-ui" -}}
            {{- $_ := set $vars "ucvLivenessPort" 3000 -}}
            {{- $livenessPathPrefix := ternary "/" (printf "/%s/" (.Values.ingress.path | trimPrefix "/" | trimSuffix "/")) (eq .Values.ingress.path "/") -}}
            {{- $livenessPath := printf "%sdeploymentPlans/alive" $livenessPathPrefix -}}
            {{- $_ := set $vars "ucvLivenessPath" $livenessPath -}}
            {{- include "ucv.livenessProbe" $vars | nindent 12 }}
          readinessProbe:
            {{- $vars := merge (dict) . -}}
            {{- $_ := set $vars "ucvService" "continuous-release-ui" -}}
            {{- $_ := set $vars "ucvReadinessPort" 3000 -}}
            {{- $readinessPathPrefix := ternary "/" (printf "/%s/" (.Values.ingress.path | trimPrefix "/" | trimSuffix "/")) (eq .Values.ingress.path "/") -}}
            {{- $readinessPath := printf "%sdeploymentPlans/ready" $readinessPathPrefix -}}
            {{- $_ := set $vars "ucvReadinessPath" $readinessPath -}}
            {{- include "ucv.readinessProbe" $vars | nindent 12 }}
          volumeMounts:
            - name: jwt-keys
              mountPath: /continuous-release-ui/jwt-keys
            {{- include "ucv.mongoTlsVolumeMount" . | nindent 12 }}
      volumes:
        - name: jwt-keys
          secret:
            secretName: {{ .Values.secrets.jwt }}
            items:
              - key: public.key
                path: public.key
        {{- include "ucv.mongoTlsVolume" . | nindent 8 }}
