apiVersion: v1
kind: Pod
metadata:
  name: "ucv-graphql-test"
  labels:
    {{- include "ucv.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test-success
    openshift.io/scc: restricted-v2
spec:
  serviceAccountName: velocity-service-account
  hostNetwork: false
  hostPID: false
  hostIPC: false
  affinity:
    {{- $vars := merge (dict) . -}}
    {{- $_ := set $vars "ucvWorkloadClass" "external" -}}
    {{- include "ucv.nodeAffinity" $vars | nindent 4 }}
  containers:
    - name: "ucv-graphql-test"
      image: alpine:3
      env:
        - name: BEARER_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.tokens }}
              key: apiToken
      securityContext:
        {{- include "ucv.securityContext" . | nindent 8 }}
      resources:
        {{- $vars := merge (dict) . -}}
        {{- $_ := set $vars "ucvService" "test-pod" -}}
        {{- include "ucv.resources" $vars | nindent 8 }}
      command: ["sh", "-c"]
      args:
        - RESPONSE=$(wget --header="Authorization:Bearer $BEARER_TOKEN" --no-check-certificate --spider --server-response --quiet http://velocity-router:8080/release-events-api/graphql/?query={lastPluginUpgradeCheck} 2>&1);
          echo "RESPONSE - $RESPONSE";
          if [[ "$RESPONSE" == "" ]]; then echo "No response received, failing"; exit 1; fi;
          if [[ "${RESPONSE:0:4}" == "wget" ]]; then echo "Received bad response, failing"; exit 1; fi;
          STATUS_CODE=$(echo "$RESPONSE" | awk 'NR==1{print $2}');
          echo "STATUS_CODE - $STATUS_CODE";
          if [[ "$STATUS_CODE" != "200" ]]; then echo "Received bad status code, failing"; exit 1; fi;
          echo "Status code success, passing";
          exit 0;
  imagePullSecrets:
    {{- include "ucv.imagePullSecrets" . | nindent 4 }}
  restartPolicy: Never