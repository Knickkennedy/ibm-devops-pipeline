# Properties for all servers for analytics data updates
# only analytical.server=1 server will do data updates
analytical.server=0

#value in milli-seconds
elastic-configuration-data-poll-ms=120000

# Compass user name used for reading data
analytics-user-name=SYSTEM_ANALYTICS

# value in days
analytics-bootstrap-data=90

# value in number of minutes to get a delta (has to be negative value in minutes)
delta.interval=-3

# TEMP values, to be removed when SSO is enabled
elastic.username=admin
elastic.password=admin
kibana.username=admin
kibana.password=admin
