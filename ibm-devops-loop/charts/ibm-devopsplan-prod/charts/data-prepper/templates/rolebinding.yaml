{{- if .Values.global.platform.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ template "ccm.subchart.fullname" . }}-data-prepper
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "data-prepper.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ template "ccm.subchart.fullname" . }}-data-prepper
roleRef:
  kind: Role
  name: {{ template "ccm.subchart.fullname" . }}-data-prepper
  apiGroup: rbac.authorization.k8s.io
{{- end -}}