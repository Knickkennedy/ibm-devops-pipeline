{{- if .Values.global.platform.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "ccm.subchart.fullname" . }}-data-prepper
  labels:
    {{- include "data-prepper.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "data-prepper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
  {{- if eq "IBM" .Values.global.devopsPlanBrand }}
        productName: {{ .Values.annotations.ibm.productName }}
        productID: {{ .Values.annotations.ibm.productID }}
        productVersion: {{ .Values.annotations.ibm.productVersion }}
        productMetric: {{ .Values.annotations.ibm.productMetric }}
        productChargedContainers: {{ .Values.annotations.ibm.productChargedContainers }}
  {{ else }}
        productName: {{ .Values.annotations.hcl.productName }}
        productVersion: {{ .Values.annotations.hcl.productVersion }}
  {{- end }}
      {{- if .Values.config }}
        checksum/config: {{ include (print .Template.BasePath "/configmap.yaml") . | sha256sum | trunc 63 }}
      {{- end }}
        checksum/pipelineconfig: {{ include (print .Template.BasePath "/secret.yaml") . | sha256sum | trunc 63 }}
      labels:
        {{- include "data-prepper.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: {{ .Values.nodeAffinity.key }}
                operator: In
                values:
                - {{ .Values.nodeAffinity.values }}
  {{- if .Values.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.topologySpreadConstraints.maxSkew }}
          topologyKey: {{ .Values.topologySpreadConstraints.topologyKey }}
          whenUnsatisfiable: {{ .Values.topologySpreadConstraints.whenUnsatisfiable }}
          labelSelector:
            matchLabelKeys:
              app.kubernetes.io/name: {{ template "ccm.subchart.fullname" . }}
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- end }}
  {{- if or (.Values.global.imagePullSecret) (.Values.global.imagePullSecrets) }}
      imagePullSecrets:
  {{- if .Values.global.imagePullSecret }}
      - name: {{ .Values.global.imagePullSecret }}
  {{- end }}
      {{- range .Values.global.imagePullSecrets }}
      - name: {{ . }}
      {{- end }}
  {{- end }}   
      securityContext:
        runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
  {{- end }}

      initContainers:
        - name: wait-for-secret
  {{- if .Values.image.repoDigests }}
          image: '{{ template "ccm.ccmImageRepo" . }}/{{ .Values.image.repositoryKubectl }}@{{ .Values.image.digestKubectl }}'
  {{- else}}
          image: '{{ template "ccm.ccmImageRepo" . }}/{{ .Values.image.repositoryKubectl }}:{{ .Values.image.tagKubectl }}'
  {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - '-c'
            - |
              echo "Waiting for secret {{ .Values.bearerTokenSecretName }} (timeout: 5 minutes)..."
              while ! kubectl get secret {{ .Values.bearerTokenSecretName }} -n {{ .Release.Namespace }} 2>/dev/null; do
                echo "Secret not found, retrying... (${SECONDS}s elapsed)"
                sleep 5
              done
              echo "Secret found, extracting token..."
          securityContext:
            runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
  {{- end }}
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
        - name: init-data-prepper
  {{- if .Values.image.repoDigests }}
          image: '{{ template "ccm.ccmImageRepo" . }}/{{ .Values.image.repository }}@{{ .Values.image.tag }}'
  {{- else}}
          image: '{{ template "ccm.ccmImageRepo" . }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}'
  {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - '-c'
            - |
                cp /tmp/pipelines/pipelines.yaml /usr/share/data-prepper/pipelines/pipelines.yaml
                /usr/share/data-prepper/scripts/pipelines.sh
          env:
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name:  {{ .Values.bearerTokenSecretName }}
                  key: apiToken 
          volumeMounts:
          - name: data-prepper-pipelines-temp
            mountPath: /tmp/pipelines
            readOnly: false
          - name: data-prepper-pipelines
            mountPath: /usr/share/data-prepper/pipelines
            readOnly: false
          securityContext:
            runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
  {{- end }}
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
  {{- if .Values.opensearch.service }}
        - name: init-opensearch
          image: busybox:1.28
          env:
          - name: opensearchservice
            value: {{ template "ccm.subchart.fullname" . }}-opensearch
          command: ['sh', '-c', "count=0;until nc -vz $(opensearchservice) 9200; do echo waiting for $(opensearchservice); if [ $count -ge 100 ]; then break; fi; count=$(( count+1 )); sleep 2; done"]
  {{- if .Values.ccm.initResources }}
          resources: {{- toYaml .Values.ccm.initResources | nindent 12 }}
  {{- end }}
          securityContext:
            runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
  {{- end }}
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
  {{- end }}

  {{- if .Values.dashboards.service }}
        - name: init-dashboards
          image: busybox:1.28
          env:
          - name: dashboardsservice
            value: {{ template "ccm.subchart.fullname" . }}-dashboards
          command: ['sh', '-c', "until nc -vz $(dashboardsservice) 5601; do echo waiting for $(dashboardsservice); sleep 2; done"]
  {{- if .Values.ccm.initResources }}
          resources: {{- toYaml .Values.ccm.initResources | nindent 12 }}
  {{- end }}
          securityContext:
            runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
  {{- end }}
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
  {{- end }}

          securityContext:
            runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
##            fsGroup: {{ .Values.securityContext.fsGroup }}
  {{- end }}
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL

      serviceAccountName: {{ template "ccm.subchart.fullname" . }}-data-prepper
      hostname:  {{ .Chart.Name }}
      containers:
        - name: {{ .Chart.Name }}
          env:
            {{- with .Values.extraEnvs }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
  {{- if .Values.opensearch.username  }}
            - name: OPENSEARCH_USERNAME
              value: {{ .Values.opensearch.username }}
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ccm.subchart.fullname" . }}-opensearch
                  key: opensearch-password
  {{- end }}
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name:  {{ .Values.bearerTokenSecretName }}
                  key: apiToken
          securityContext:
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
  {{- if .Values.image.repoDigests }}
          image: '{{ template "ccm.ccmImageRepo" . }}/{{ .Values.image.repository }}@{{ .Values.image.tag }}'
  {{- else}}
          image: '{{ template "ccm.ccmImageRepo" . }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}'
  {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
          {{- range .Values.ports }}
            - name: {{ .name }}
              containerPort: {{ .port }}
              protocol: TCP
          {{- end }}
            - name: server
              containerPort: {{ (.Values.config).serverPort | default 4900 }}
              protocol: TCP
          {{- if semverCompare ">=1.16-0" .Capabilities.KubeVersion.Version }}
          startupProbe:
            httpGet:
              path: /list
              port: server
              {{- if not ( empty (.Values.config).ssl ) }}
              scheme: HTTPS
              {{- end }}
            periodSeconds: 10
            initialDelaySeconds: 10
            failureThreshold: 2
          {{- end }}
          livenessProbe:
            httpGet:
              path: /list
              port: server
              {{- if not ( empty (.Values.config).ssl ) }}
              scheme: HTTPS
              {{- end }}
            periodSeconds: 10
            initialDelaySeconds: 2
            failureThreshold: 2
          readinessProbe:
            httpGet:
              path: /list
              port: server
              {{- if not ( empty (.Values.config).ssl ) }}
              scheme: HTTPS
              {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data-prepper-config
              mountPath: /usr/share/data-prepper/config
            - name: data-prepper-pipelines
              mountPath: /usr/share/data-prepper/pipelines
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data-prepper-config
          configMap:
            name: {{ template "ccm.subchart.fullname" . }}-data-prepper-config
        - name: data-prepper-pipelines-temp
          secret:
            secretName: {{ template "ccm.subchart.fullname" . }}-data-prepper-pipeline
        - name: data-prepper-pipelines
          emptyDir: {}
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
