{{- if (and .Values.global.platform.enabled .Values.networkPolicy.enabled) }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
    app.kubernetes.io/name: allow-control-ssh-http
    app.kubernetes.io/part-of: '{{ .Chart.Name }}'
    app.kubernetes.io/version: '{{ regexReplaceAll "-.*" .Chart.AppVersion "" }}'
    helm.sh/chart: '{{ .Chart.Name }}-{{ .Chart.Version }}'
  name: '{{ .Release.Name }}-allow-control-ssh-http'
spec:
  podSelector:
    matchLabels:
      {{ include "gitea.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - protocol: TCP
      port: {{ .Values.gitea.config.server.SSH_LISTEN_PORT }}
    - protocol: TCP
      port: {{ .Values.service.http.port }}
{{- end }}
