# Default values
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

devopsplan:
  service: true
## Number of instances to run
replicaCount: 1
## Global settings
global:
  imageRegistry: cp.icr.io/cp
  imagePullSecret: ""
  imagePullSecrets: []
  sofySolution: false
  domain: ""
  devopsPlanBrand: "IBM"
  licenseMetric: false
  licenseIntervalTime: ""
  passwordSeed: ""
  fullnameOverride: ""
  persistence:
    rwoStorageClass: ""
    rwxStorageClass: ""
  plan:
    enabled: true
  platform:
    enabled: false
    path: ''
    embedPath: ''
    oidc:
      issuerPath: ""
      authorizationPath: ""
      tokenPath: ""
      userinfoPath: ""
      introspectionPath: ""
      jwksPath: ""
      logoutPath: ""
      ## smtp settings
    smtp:
      sender: ""
      host: ""
      port: ""
      username: ""
      password: ""
      startTLS: false
      smtps: false
## Platform Configuration
