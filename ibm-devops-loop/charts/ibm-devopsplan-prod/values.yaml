## Time zone setting
timeZone: EST5EDT
## Server qualified URL path
serverQualifiedUrlPath: ""
## PriorityClass name and value
priorityClassName: devopsplan-priority
priorityClassValue: 1000000
## Spring Data REST Database Properties
spring:
  datastore:
    enabled: true
    url: ""
    username: "postgres"
    password: ""
  jpaHibernate:
    ddlAuto: "update"
  mail:
    host: ""
    port: ""
    username: ""
    password: ""
## Tenant Database Properties
tenant:
  datastore:
    enabled: true
    vendor: "PostgreSQL"
    server: ""
    dbname: "postgres"
    username: "postgres"
    password: ""
    # Store the token and token info in the database, not file system.
    token: true
    # Specify a secret key (used for encrypting data in the database and in transit).
    secret: ""
  registration:
    code: "NONE"
  email:
    fromaddress: ""
  corelogontokenclient:
    usesecure: false
## Deployment properties settings
deployment:
  mode: ""
  userpass: ""
## Database settings
db:
  service: false
## SSO configuration.
sso:
  enabled: false
## Mapping Database hostname to Database IP address
## If you set Database server name as Database hostname, then the mapping requires.
## Uncomment the following lines and add Database IP and Database hostname.
#hostAliases:
#  - ip: ""
#    hostnames:
#    - ""

