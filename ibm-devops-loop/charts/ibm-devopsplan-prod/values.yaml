image:
  repository: devops-plan/devopsplan
  tag: sha256:802a8a61667c20a049b93f55d90d63f8add8153536e4f571c0079766d51dc9f0
  pullPolicy: IfNotPresent
  secret: ""
  repoDigests: true
## devopsplan hostname
