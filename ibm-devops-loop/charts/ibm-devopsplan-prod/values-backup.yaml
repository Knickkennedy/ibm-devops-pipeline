global:
  security:
    allowInsecureImages: true

minio:
  auth:
    rootUser: admin
    rootPassword: PoKKL8Y9YZ
  defaultBuckets: "velero-backup"
  disableWebUI: false
  service:
    type: LoadBalancer
    ports:
      api: 9000
      console: 9001
    nodePorts:
      api: 32722
      console: 32721
  lifecycleHooks:
    postStart:
      exec:
        command:
          - sh
          - -c
          - |
            for i in $(seq 1 120); do
              if /opt/bitnami/minio-client/bin/mc admin info minio; then
                echo "MinIO is ready"
                break
              fi
              echo "Waiting for MinIO to be ready... (attempt $i)"
              sleep 2
            done

            if ! /opt/bitnami/minio-client/bin/mc alias list | grep -qw "^minio"; then
              /opt/bitnami/minio-client/bin/mc alias set minio http://localhost:9000 admin PoKKL8Y9YZ && \
              echo "mc alias set succeeded" || echo "Warning: mc alias set failed"
            else
              echo "Alias 'minio' already exists, skipping alias set."
            fi

            if ! /opt/bitnami/minio-client/bin/mc admin accesskey list minio | grep -q "velero-key"; then
              /opt/bitnami/minio-client/bin/mc admin accesskey create minio/ admin \
                --access-key vkOLMBqko8yRf416A9VP \
                --secret-key VD0rivxGsqZEOpDdRrTSOyevGKZmZnT8r3pzM2Ja \
                --name velero-key && \
              echo "Access key 'velero-key' created successfully" || echo "Warning: accesskey create failed"
            else
              echo "Access key 'velero-key' already exists, skipping accesskey creation."
            fi

            /opt/bitnami/minio-client/bin/mc admin accesskey list minio || echo "Warning: failed to list access keys"

  readinessProbe:
    httpGet:
      path: /minio/health/ready
      port: 9000
    initialDelaySeconds: 10
    periodSeconds: 5

  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1"

velero:
  version: "8.7.1"
  deployNodeAgent: true
  configuration:
    volumeSnapshotLocation:
      - name: default
        provider: aws
        config:
          region: us-east-1
    uploaderType: "restic"
  features:
    volumeSnapshots: false

  credentials:
    useSecret: true
    existingSecret:
    secretContents:
      cloud: |
        [default]
        aws_access_key_id=vkOLMBqko8yRf416A9VP
        aws_secret_access_key=VD0rivxGsqZEOpDdRrTSOyevGKZmZnT8r3pzM2Ja

  server:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

  nodeAgent:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

backupRestore:
  enabled: true
devopsplan:
  service: false
winInstall:
  enabled: false
analytics:
  service: false
search:
  service: false
postgresql:
  enabled: false
keycloak:
  enabled: false
  service:
    enabled: false
keycloaksrv:
  enabled: false
nginx:
  service: false
dashboards:
  service: false
logstash:
  service: false
opensearch:
  service: false
