global:
  security:
    allowInsecureImages: true

minio:
  auth:
    rootUser: admin
    rootPassword: PoKKL8Y9YZ
  defaultBuckets: "velero-backup"
  disableWebUI: false
  service:
    type: LoadBalancer
    ports:
      api: 9000
      console: 9001
    nodePorts:
      api: 32722
      console: 32721
  lifecycleHooks:
    postStart:
      exec:
        command:
          - sh
          - -c
          - |
            for i in $(seq 1 60); do
              if /opt/bitnami/minio-client/bin/mc admin info minio; then
                echo "MinIO is ready"
                break
              fi
              echo "Waiting for MinIO to be ready..."
              sleep 2
            done
            /opt/bitnami/minio-client/bin/mc alias set minio http://localhost:9000 admin PoKKL8Y9YZ || { echo "mc alias set failed"; exit 1; }
            /opt/bitnami/minio-client/bin/mc admin accesskey create minio/ admin --access-key vkOLMBqko8yRf416A9VP --secret-key VD0rivxGsqZEOpDdRrTSOyevGKZmZnT8r3pzM2Ja --name velero-key || { echo "accesskey create failed"; exit 1; }
            /opt/bitnami/minio-client/bin/mc admin accesskey list minio

  readinessProbe:
    httpGet:
      path: /minio/health/ready
      port: 9000
    initialDelaySeconds: 10
    periodSeconds: 5

velero:
  version: "8.7.1"
  deployNodeAgent: true
  configuration:
    backupStorageLocation:
      - name: default
        provider: aws
        bucket: velero-backup
        config:
          region: minio
          s3ForcePathStyle: "true"
          s3Url: http://hcl-devopsplan-minio.velero.svc.cluster.local:9000
    volumeSnapshotLocation:
      - name: default
        provider: aws
        config:
          region: us-east-1
    uploaderType: "restic"
  features:
    volumeSnapshots: false

  credentials:
    useSecret: true
    existingSecret:
    secretContents:
      cloud: |
        [default]
        aws_access_key_id=vkOLMBqko8yRf416A9VP
        aws_secret_access_key=VD0rivxGsqZEOpDdRrTSOyevGKZmZnT8r3pzM2Ja
