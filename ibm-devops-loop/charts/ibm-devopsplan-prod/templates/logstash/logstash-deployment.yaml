{{- if .Values.logstash.service -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ccm.fullname" . }}-logstash
  labels:
    {{- include "ccm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.logstash.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ccm.name" . }}-logstash
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/managed-by: {{ .Release.Service }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ccm.name" . }}-logstash
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
      annotations:
  {{- if eq "IBM" .Values.global.devopsPlanBrand }}
        productName: {{ .Values.annotations.ibm.productName }}
        productID: {{ .Values.annotations.ibm.productID }}
        productVersion: {{ .Values.annotations.ibm.productVersion }}
        productMetric: {{ .Values.annotations.ibm.productMetric }}
        productChargedContainers: {{ .Values.annotations.ibm.productChargedContainers }}
  {{ else }}
        productName: {{ .Values.annotations.hcl.productName }}
        productVersion: {{ .Values.annotations.hcl.productVersion }}
  {{- end }}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: {{ .Values.logstash.nodeAffinity.key }}
                operator: In
                values:
                - {{ .Values.logstash.nodeAffinity.values }}
  {{- if .Values.logstash.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.logstash.topologySpreadConstraints.maxSkew }}
          topologyKey: {{ .Values.logstash.topologySpreadConstraints.topologyKey }}
          whenUnsatisfiable: {{ .Values.logstash.topologySpreadConstraints.whenUnsatisfiable }}
          labelSelector:
            matchLabelKeys:
              app.kubernetes.io/name: {{ include "ccm.name" . }}-logstash
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- end }}
  {{- if or (.Values.global.imagePullSecret) (.Values.global.imagePullSecrets) }}
      imagePullSecrets:
  {{- if .Values.global.imagePullSecret }}
      - name: {{ .Values.global.imagePullSecret }}
  {{- end }}
      {{- range .Values.global.imagePullSecrets }}
      - name: {{ . }}
      {{- end }}
  {{- end }}   
      securityContext:
        runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
  {{- end }}
      volumes:
        - name: logstashpipeline
          configMap:
            name: {{ include "ccm.fullname" . }}-logstash-configmap
      initContainers:
      {{- if .Values.opensearch.service }}
        - name: init-opensearch
          image: busybox:1.28
          env:
          - name: opensearchservice
            value: {{ include "ccm.fullname" . }}-opensearch
          command: ['sh', '-c', "until nc -vz $(opensearchservice) 9200; do echo waiting for $(opensearchservice); sleep 2; done"]
      {{- if .Values.ccm.initResources }}
          resources: {{- toYaml .Values.ccm.initResources | nindent 12 }}
      {{- end }}
      {{- end }}
          securityContext:
            runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
##            fsGroup: {{ .Values.securityContext.fsGroup }}
  {{- end }}
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
      hostname:  "{{ .Values.logstash.hostname }}"
      serviceAccount: {{ include "ccm.fullname" . }}-sa
      containers:
      - name: {{ .Chart.Name }}-logstash
     {{- if .Values.image.repoDigests }}
        image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.logstash.image.repository }}@{{ .Values.logstash.image.tag }}"
     {{- else}}
        image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.logstash.image.repository }}:{{ .Values.logstash.image.tag }}"
     {{- end }}
        imagePullPolicy: {{ .Values.logstash.image.pullPolicy }}
     {{- if .Values.probes.readiness.logstash }}
        readinessProbe:
{{ toYaml .Values.probes.readiness.logstash | indent 10 }}
     {{- end }}
     {{- if .Values.probes.liveness.logstash }}
        livenessProbe:
{{ toYaml .Values.probes.liveness.logstash | indent 10 }}
     {{- end }}
        securityContext:
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
        ports:
          - name: http
            containerPort:  {{ .Values.logstash.port }}
            protocol: TCP
        env:
          - name: LS_JAVA_OPTS
            value: "-Xmx1g -Xms1g"
        volumeMounts:
          - name: logstashpipeline
            mountPath: /usr/share/logstash/pipeline/logstash.conf
            subPath: logstash.conf
        resources:
          {{- toYaml .Values.logstash.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
