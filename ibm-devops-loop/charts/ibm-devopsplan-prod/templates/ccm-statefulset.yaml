              value: "{{ .Values.tenant.datastore.vendor }}"
      {{- if .Values.tenant.datastore.server }}
            - name: TENANT_DATASTORE_SERVER
              value: "{{ .Values.tenant.datastore.server }}"
      {{- else if .Values.postgresql.enabled }}
            - name: TENANT_DATASTORE_SERVER
              value: {{ include "plan.fullname" . }}-postgresql
      {{- end }}
            - name: TENANT_DATASTORE_DB_NAME
              value: "{{ .Values.tenant.datastore.dbname }}"
            - name: TENANT_DATASTORE_DBO
              value: "{{ .Values.tenant.datastore.username }}"
            - name: TENANT_DATASTORE_DBO_PW
