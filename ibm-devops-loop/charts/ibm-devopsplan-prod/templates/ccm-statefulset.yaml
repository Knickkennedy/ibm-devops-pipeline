{{- if .Values.devopsplan.service }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ccm.fullname" . }}
  labels:
    {{- include "ccm.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "ccm.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ccm.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/managed-by: {{ .Release.Service }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ccm.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        devopsplancomp: {{ include "ccm.fullname" . }}-ccm
      annotations:
  {{- if eq "IBM" .Values.global.devopsPlanBrand }}
        productName: {{ .Values.annotations.ibm.productName }}
        productID: {{ .Values.annotations.ibm.productID }}
        productVersion: {{ .Values.annotations.ibm.productVersion }}
        productMetric: {{ .Values.annotations.ibm.productMetric }}
        productChargedContainers: {{ .Values.annotations.ibm.productChargedContainers }}
  {{ else }}
        productName: {{ .Values.annotations.hcl.productName }}
        productVersion: {{ .Values.annotations.hcl.productVersion }}
  {{- end }}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: {{ .Values.ccm.nodeAffinity.key }}
                operator: In
                values:
                - {{ .Values.ccm.nodeAffinity.values }}
  {{- if .Values.ccm.podAffinity.enabled }}
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                - {{ include "ccm.name" . }}
            topologyKey: "kubernetes.io/hostname"
  {{- end }}
  {{- if .Values.ccm.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.ccm.topologySpreadConstraints.maxSkew }}
          topologyKey: {{ .Values.ccm.topologySpreadConstraints.topologyKey }}
          whenUnsatisfiable: {{ .Values.ccm.topologySpreadConstraints.whenUnsatisfiable }}
          labelSelector:
            matchLabelKeys:
              app.kubernetes.io/name: {{ include "ccm.name" . }}
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- end }}
  {{- if or (.Values.global.imagePullSecret) (.Values.global.imagePullSecrets) }}
      imagePullSecrets:
  {{- if .Values.global.imagePullSecret }}
      - name: {{ .Values.global.imagePullSecret }}
  {{- end }}
      {{- range .Values.global.imagePullSecrets }}
      - name: {{ . }}
      {{- end }}
  {{- end }}
      securityContext:
  {{ if .Values.nonRootUser }}
        runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
  {{- end }}
  {{- else }}
        fsGroup: 2000
  {{- end }}
      volumes:
      {{- if .Values.persistence.enabled }}
      {{- if .Values.persistence.ccm.enabled }}
      {{- if .Values.persistence.ccm.config.enabled }}
        - name: config
          persistentVolumeClaim:
      {{- if .Values.persistence.ccm.config.existingClaim }}
            claimName: .Values.persistence.ccm.config.existingClaim
      {{- else }}
            claimName: config-{{ include "ccm.fullname" . }}
      {{- end }}
      {{- else }}
          emptyDir: {}
      {{- end }}
      {{- if .Values.persistence.ccm.share.enabled }}
        - name: share
          persistentVolumeClaim:
      {{- if .Values.persistence.ccm.share.existingClaim }}
            claimName: .Values.persistence.ccm.share.existingClaim
      {{- else }}
            claimName: share-{{ include "ccm.fullname" . }}
      {{- end }}
      {{- else }}
          emptyDir: {}
      {{- end }}
      {{- end }}
      {{- end }}
      {{- if .Values.winInstall.enabled }}
      {{- if .Values.persistence.enabled }}
        - name: win-install
          persistentVolumeClaim:
      {{- if .Values.winInstall.existingClaim }}
            claimName: .Values.winInstall.existingClaim
      {{- else }}
            claimName: win-install-{{ include "ccm.fullname" . }}
      {{- end }}
      {{- end }}
      {{- end }}
      {{ if .Values.ssl.enabled }}
        - name: ssl-conf
          configMap:
            name: "{{ .Values.ssl.configMapName }}"
      {{- end }}
      {{ if .Values.persistence.enabled }}
      {{- if .Values.persistence.connectOption.ccm }}
        - name: oracle-secure
          hostPath:
            path: "{{ .Values.persistence.connectOption.path }}"
      {{- end }}
      {{- end }}
      {{ if .Values.keycloak.enabled }}
      {{ if .Values.keycloak.jsonFile.enabled }}
        - name: keycloak-confmap
          configMap:
            name: "{{ .Values.keycloak.jsonFile.configMapName }}"
      {{- else if .Values.global.platform.enabled }}
        - name: keycloak-confmap
          configMap:
            name: "{{ include "ccm.fullname" . }}-keycloak-configmap"
            defaultMode: 0700
      {{- end }}
      {{- end }}
      {{- if eq "IBM" .Values.global.devopsPlanBrand }}
      {{- if .Values.global.licenseMetric}}
      {{- if (.Capabilities.APIVersions.Has "route.openshift.io/v1") }}
        - name: ibm-license-configmap
          configMap:
            name: "ibm-licensing-upload-config"
      {{- end }}
      {{- end }}
      {{- end }}
      {{ if .Values.persistence.enabled }}
      {{- if .Values.persistence.ccm.enabled }}
        - name: configmap-data
          configMap:
            name: {{ include "ccm.fullname" . }}-configmap
            defaultMode: 0700
      {{- end }}
      {{- end }}
      {{- if .Values.persistence.properties.application.enabled }}
        - name: application-properties
          configMap:
            name: {{ include "ccm.fullname" . }}-application-configmap
            defaultMode: 0777
      {{- end }}
      {{- if .Values.persistence.properties.analytics.enabled }}
        - name: analytics-properties
          configMap:
            name: {{ include "ccm.fullname" . }}-analytics-configmap
            defaultMode: 0777
      {{- end }}
  {{- if .Values.priorityClassName }}
      priorityClassName: {{ include "ccm.fullname" . }}-{{ .Values.priorityClassName }}
  {{- end }}
      initContainers:
      {{- if .Values.keycloak.enabled }}
      {{- if or ( and (eq .Values.keycloak.service.enabled true) (eq .Values.keycloaksrv.enabled true)) (eq .Values.global.platform.enabled true) }}
        - name: init-keycloak
      {{- if .Values.global.platform.enabled }}
          image: "curlimages/curl:7.76.1"
          imagePullPolicy: IfNotPresent
          env:
          - name: KEYCLOAK_URL
            value: "https://{{ .Values.global.domain }}/auth/realms/{{ .Values.keycloak.realmName }}"
          command: ["sh", "-c", "while [[ $(curl -s -k -o /dev/null -w '%{http_code}' $KEYCLOAK_URL) != 200 ]]; do sleep 1; echo $(date +'%Y-%m-%d_%H%M%S'): Keycloak $(KEYCLOAK_URL) is not ready; done"]
      {{- else }}
          image: "curlimages/curl:7.76.1"
          imagePullPolicy: IfNotPresent
          env:
          - name: KEYCLOAK_URL
            value: "https://{{ .Release.Name }}-keycloaksrv/realms/master"
          command: ["sh", "-c", "while [[ $(curl -s -k -o /dev/null -w '%{http_code}' $KEYCLOAK_URL) != 200 ]]; do sleep 1; echo $(date +'%Y-%m-%d_%H%M%S'): Keycloak $(KEYCLOAK_URL) is not ready; done"]
      {{- end }}
      {{- if .Values.ccm.initResources }}
          resources: {{- toYaml .Values.ccm.initResources | nindent 12 }}
      {{- end }}
          securityContext:
            runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
##            fsGroup: {{ .Values.securityContext.fsGroup }}
  {{- end }}
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
      {{- end }}
      {{- end }}
      {{- if .Values.opensearch.service }}
        - name: init-opensearch
          image: busybox:1.28
          env:
          - name: opensearchservice
            value: {{ include "ccm.fullname" . }}-opensearch
          command: ['sh', '-c', "until nc -vz $(opensearchservice) 9200; do echo waiting for $(opensearchservice); sleep 2; done"]
      {{- if .Values.ccm.initResources }}
          resources: {{- toYaml .Values.ccm.initResources | nindent 12 }}
      {{- end }}
      {{- end }}
          securityContext:
            runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
##            fsGroup: {{ .Values.securityContext.fsGroup }}
  {{- end }}
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
      {{- if .Values.nginx.service }}
        - name: init-nginx
          image: busybox:1.28
          env:
          - name: nginxservice
            value: {{ include "ccm.fullname" . }}-nginx
          command: ['sh', '-c', "until nc -vz $(nginxservice) 5602; do echo waiting for $(nginxservice); sleep 2; done"]
      {{- if .Values.ccm.initResources }}
          resources: {{- toYaml .Values.ccm.initResources | nindent 12 }}
      {{- end }}
      {{- end }}
          securityContext:
            runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
##            fsGroup: {{ .Values.securityContext.fsGroup }}
  {{- end }}
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
      {{ if .Values.winInstall.enabled }}
      {{- if .Values.persistence.enabled }}
        - name: init-win-install
      {{- if .Values.image.repoDigests }}
          image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.winInstall.image.repository }}@{{ .Values.winInstall.image.tag }}"
      {{- else }}
          image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.winInstall.image.repository }}:{{ .Values.winInstall.image.tag }}"
      {{- end }}
          imagePullPolicy: {{ .Values.winInstall.image.pullPolicy }}
      {{- if .Values.ccm.initResources }}
          resources: {{- toYaml .Values.ccm.initResources | nindent 12 }}
      {{- end }}
          securityContext:
            runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
##            fsGroup: {{ .Values.securityContext.fsGroup }}
  {{- end }}
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
          command:
            - /ccm/win-install.sh
          volumeMounts:
            - name: win-install
              mountPath: /ccm/win-install
      {{- end }}
      {{- end }}
      {{ if .Values.persistence.enabled }}
      {{- if .Values.persistence.ccm.enabled }}
      {{- if or (eq .Values.persistence.ccm.data.enabled true) (eq .Values.persistence.ccm.config.enabled true) }}
        - name: prepare-config-volume
      {{- if .Values.image.repoDigests }}
          image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.image.repository }}@{{ .Values.image.tag }}"
      {{- else }}
          image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
      {{- end }}
      {{- if .Values.ccm.initResources }}
          resources: {{- toYaml .Values.ccm.initResources | nindent 12 }}
      {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
      {{ if .Values.nonRootUser }}
          securityContext:
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
       {{- end }}
          command:
            - /work/data-config-properties.sh
          volumeMounts:
      {{- if .Values.persistence.ccm.data.enabled }}
            - name: data
              mountPath: /tmp/data
      {{- end }}
      {{- if .Values.persistence.ccm.config.enabled }}
            - name: config
              mountPath: /tmp/config
      {{- end }}
      {{- if .Values.persistence.ccm.share.enabled }}
            - name: share
              mountPath: /tmp/share
      {{- end }}
      {{- end }}
      {{- end }}
      {{- end }}
    {{- with .Values.hostAliases }}
      hostAliases:
{{ toYaml . | indent 6 }}
    {{- end }}
      hostname:  "{{ .Values.hostname }}"
      serviceAccount: {{ include "ccm.fullname" . }}-sa
      containers:
        - name: {{ .Chart.Name }}
      {{- if .Values.image.repoDigests }}
          image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.image.repository }}@{{ .Values.image.tag }}"
      {{- else }}
          image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
      {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
      {{ if .Values.nonRootUser }}      
          securityContext:
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
      {{- end }}
          ports:
      {{- if .Values.global.platform.enabled }}
            - name: http
              containerPort: 8191
      {{- end }}
            - name: https
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
      {{- if semverCompare ">=1.16-0" .Capabilities.KubeVersion.Version }}
      {{- if .Values.probes.startup.ccm.enabled }}
          startupProbe:
            httpGet:
      {{- if .Values.global.platform.enabled }}
              path: {{ .Values.probes.http.ccmPlatform.path }}
              port: {{ .Values.service.targetPortPlatform }}
              scheme: {{ .Values.probes.http.ccmPlatform.scheme }}
      {{- else }}
              path: {{ .Values.probes.http.ccm.path }}
              port: {{ .Values.service.targetPort }}
              scheme: {{ .Values.probes.http.ccm.scheme }}
      {{- end }}
            initialDelaySeconds: {{ .Values.probes.startup.ccm.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.ccm.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.ccm.timeoutSeconds }}
            successThreshold: {{ .Values.probes.startup.ccm.successThreshold }}
            failureThreshold: {{ .Values.probes.startup.ccm.failureThreshold }}
      {{- end }}
      {{- end }}

      {{- if .Values.probes.liveness.ccm.enabled }}
          livenessProbe:
            exec:
              command:
              - /bin/bash
              - -c
              - if [[ -z "$(pgrep -a java  | grep devopsplan-rest-server | awk '{ print $1; }')" ]]; then exit 1; fi
            initialDelaySeconds: {{ .Values.probes.liveness.ccm.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.ccm.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.ccm.timeoutSeconds }}
            successThreshold: {{ .Values.probes.liveness.ccm.successThreshold }}
            failureThreshold: {{ .Values.probes.liveness.ccm.failureThreshold }}
      {{- end }}
      {{- if .Values.probes.readiness.ccm.enabled }}
          readinessProbe:
            httpGet:
      {{- if .Values.global.platform.enabled }}
              path: {{ .Values.probes.http.ccmPlatform.path }}
              port: {{ .Values.service.targetPortPlatform }}
              scheme: {{ .Values.probes.http.ccmPlatform.scheme }}
      {{- else }}
              path: {{ .Values.probes.http.ccm.path }}
              port: {{ .Values.service.targetPort }}
              scheme: {{ .Values.probes.http.ccm.scheme }}
      {{- end }}
            initialDelaySeconds: {{ .Values.probes.readiness.ccm.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.ccm.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.ccm.timeoutSeconds }}
            successThreshold: {{ .Values.probes.readiness.ccm.successThreshold }}
            failureThreshold: {{ .Values.probes.readiness.ccm.failureThreshold }}
      {{- end }}
          env:
      {{ if .Values.swagger.enabled }}
            - name: ENABLE_SWAGGER
              value: "{{ .Values.swagger.enabled }}"
      {{- end }}          
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt-secret
      {{- if eq "IBM" .Values.global.devopsPlanBrand }}
            - name: DEVOPS_PLAN_BRAND
              value: "IBM"
      {{- if .Values.global.licenseMetric}}
            - name: LICENSE_INTERVAL_TIME
              value: "{{ .Values.global.licenseIntervalTime }}"
            - name: PRODUCT_ID 
              value: {{ .Values.annotations.ibm.productID }}
            - name: PRODUCT_METRIC
              value: {{ .Values.annotations.ibm.productMetric }}
            - name: ITLM_PRODUCT_NAME
              value: {{ .Values.annotations.ibm.productName }}
            - name: PRODUCT_CHARGED
              value: {{ .Values.annotations.ibm.productChargedContainers }}
            - name: LICENCE_TOKEN  
              valueFrom:
                secretKeyRef:
                  name: ibm-licensing-upload-token
                  key: token-upload
      {{- if (.Capabilities.APIVersions.Has "route.openshift.io/v1") }}
            - name: DEVOPS_PLAN_CLUSTER
              value: "OPENSHIFT"
      {{- end }}
      {{- end }}
      {{- else }}
            - name: DEVOPS_PLAN_BRAND
              value: "HCL"
      {{- end }}
      {{- if .Values.global.platform.enabled }}
            - name: PLATFORM_ENABLED
              value: "TRUE"
            - name: SERVER_QUALIFIED_URL_PATH
              value: "https://{{ .Values.global.domain }}/plan"
      {{- if .Values.global.platform.path }}
            - name: PLATFORM_PATH
              value: {{ .Values.global.platform.path }}
      {{- end }}
      {{- if .Values.global.platform.embedPath }}
            - name: PLATFORM_EMBED_PATH
              value: {{ .Values.global.platform.embedPath }}
      {{- end }}
      {{- if .Values.global.platform.oidc.issuerPath }}
            - name: PLATFORM_OIDC_ISSUSER_PATH
              value: {{ .Values.global.domain }}{{ .Values.global.platform.oidc.issuerPath }}
      {{- end }}
      {{- if .Values.global.platform.oidc.authorizationPath }}
            - name: PLATFORM_OIDC_AUTHORIZATION_PATH
              value: {{ .Values.global.domain }}{{ .Values.global.platform.oidc.authorizationPath }}
      {{- end }}
      {{- if .Values.global.platform.oidc.tokenPath }}
            - name: PLATFORM_OIDC_TOKEN_PATH
              value: {{ .Values.global.domain }}{{ .Values.global.platform.oidc.tokenPath }}
      {{- end }}
      {{- if .Values.global.platform.oidc.userinfoPath }}
            - name: PLATFORM_OIDC_USERINFO_PATH
              value: {{ .Values.global.domain }}{{ .Values.global.platform.oidc.userinfoPath }}
      {{- end }}
      {{- if .Values.global.platform.oidc.introspectionPath }}
            - name: PLATFORM_OIDC_INTROSPECTION_PATH
              value: {{ .Values.global.domain }}{{ .Values.global.platform.oidc.introspectionPath }}
      {{- end }}
      {{- if .Values.global.platform.oidc.jwksPath }}
            - name: PLATFORM_OIDC_JWKS_PATH
              value: {{ .Values.global.domain }}{{ .Values.global.platform.oidc.jwksPath }}
      {{- end }}
      {{- if .Values.global.platform.oidc.logoutPath }}
            - name: PLATFORM_OIDC_LOGOUT_PATH
              value: {{ .Values.global.domain }}{{ .Values.global.platform.oidc.logoutPath }}
      {{- end }}
##      {{- if .Values.platform.oidc.clientId }}
##            - name: PLATFORM_OAUTH_CLIENT_ID
##              valueFrom:
##                secretKeyRef:
##                  key: client-id
##                  name: {{ .Values.platform.oidc.clientId }}
##      {{- end }}
##      {{- if .Values.platform.oidc.clientSecret }}
##            - name: PLATFORM_OAUTH_CLIENT_SECRET
##              valueFrom:
##                secretKeyRef:
##                  key: client-secret
##                  name: {{ .Values.platform.oidc.clientSecret }}
##      {{- end }}
      {{- end }}
            - name: CQ_DATABASES
              value: {{ include "ccm.app-folder" . }}/share
            - name: KUBERNETES
              value: "TRUE"
      {{ if .Values.db.service }}
            - name: DB_CONNECTION_SET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ccm.fullname" . }}-db-secret
                  key: db-connection-set
      {{- end }}
      {{- if .Values.timeZone }}
            - name: TIME_ZONE
              value: {{ .Values.timeZone }}
            - name: LANG
              value: 'en_US.UTF-8'
            - name: LC_ALL
              value: 'en_US.UTF-8'
      {{- end }}
      {{ if .Values.ssl.enabled }}
            - name: SSL_KEY_ALIAS
              value: "{{ .Values.ssl.keyAlias }}"
            - name: SSL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ccm.fullname" . }}-db-secret
                  key: ssl-password
      {{- end }}
      {{- if .Values.deployment.mode }}
            - name: DEPLOYMENT_MODE
              value: "{{ .Values.deployment.mode }}"
      {{- end }}
      {{- if .Values.deployment.userpass }}
            - name: DEPLOYMENT_USERPASS
              value: "{{ .Values.deployment.userpass }}"
      {{- end }}
      {{- if .Values.feedback.toEmailaddress }}
            - name: TO_EMAIL_ADDRESS
              value: "{{ .Values.feedback.toEmailaddress }}"
      {{- end }}
      {{- if .Values.feedback.fromEmailaddress }}
            - name: FROM_EMAIL_ADDRESS
              value: "{{ .Values.feedback.fromEmailaddress }}"
      {{- end }}
      {{- if .Values.spring.datastore.enabled }}
            - name: SPRING_DATASTORE
              value: "TRUE"
      {{- if .Values.spring.datastore.url }}
            - name: SPRING_DATASTORE_URL
              value: "{{ .Values.spring.datastore.url }}"
      {{- else if .Values.postgresql.enabled }}
            - name: SPRING_DATASTORE_URL
      {{ if .Values.persistence.postgresql.initPostgres }}
              value: jdbc:postgresql://{{ include "plan.fullname" . }}-postgresql:5432/postgres
      {{- else }}
              value: jdbc:postgresql://{{ include "plan.fullname" . }}-postgresql:5432/{{ .Values.tenant.datastore.dbname }}
      {{- end }}
      {{- end }}
            - name: SPRING_DATASTORE_USERNAME
              value: "{{ .Values.spring.datastore.username }}"
            - name: SPRING_DATASTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "plan.fullname" . }}-postgresql
                  key: spring-datastore-password
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "{{ .Values.spring.jpaHibernate.ddlAuto }}"
      {{- end }}
      {{- if or (.Values.spring.mail.host) (.Values.global.platform.smtp.host) }}
            - name: SPRING_MAIL_HOST
      {{- if .Values.global.platform.smtp.host }}
              value: "{{ .Values.global.platform.smtp.host }}"
      {{- else if .Values.spring.mail.host }}
              value: "{{ .Values.spring.mail.host }}"
      {{- end }}
      {{- end }}
      {{- if or (.Values.spring.mail.port) (.Values.global.platform.smtp.port) }}
            - name: SPRING_MAIL_PORT  
      {{- if .Values.global.platform.smtp.port }}
              value: "{{ .Values.global.platform.smtp.port }}"
      {{- else if .Values.spring.mail.port }}
              value: "{{ .Values.spring.mail.port }}"
      {{- end }}
      {{- end }}
      {{- if or (.Values.spring.mail.username) (.Values.global.platform.smtp.username) }}
            - name: SPRING_MAIL_USERNAME
      {{- if .Values.global.platform.smtp.username }}
              value: "{{ .Values.global.platform.smtp.username }}"
      {{- else if .Values.spring.mail.username }}
              value: "{{ .Values.spring.mail.username }}"
      {{- end }}
      {{- end }}
      {{- if or (.Values.spring.mail.password) (.Values.global.platform.smtp.password) }}
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ccm.fullname" . }}-db-secret
                  key: spring-mail-password
      {{- end }}
      {{- if .Values.global.platform.smtp.startTLS }}
            - name: SPRING_MAIL_STARTTLS
              value: "{{ .Values.global.platform.smtp.startTLS }}"
      {{- end }}
      {{- if .Values.global.platform.smtp.smtps }}
            - name: SPRING_MAIL_SMTPS
              value: "{{ .Values.global.platform.smtp.smtps }}"
      {{- end }}
      {{- if .Values.tenant.datastore.enabled }}
            - name: TENANT_DATASTORE
              value: "TRUE"
