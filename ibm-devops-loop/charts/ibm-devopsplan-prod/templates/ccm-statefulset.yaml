              value: "{{ .Values.tenant.registration.code }}"
      {{- if or (.Values.tenant.email.fromaddress) (.Values.global.platform.smtp.sender) }}
            - name: TENANT_EMAIL_FROM_ADDRESS
      {{- if .Values.global.platform.smtp.sender }}
              value: "{{ .Values.global.platform.smtp.sender }}"
      {{- else if .Values.tenant.email.fromaddress }}
              value: "{{ .Values.tenant.email.fromaddress }}"
      {{- end }}
      {{- end }}
            - name: TENANT_DATASTORE_TOKEN
              value: "{{ .Values.tenant.datastore.token }}"
      {{- if .Values.tenant.datastore.secret }}      
            - name: TENANT_DATASTORE_SECRET
              value: "{{ .Values.tenant.datastore.secret }}"
      {{- end }}
      {{- end }}
      {{- if .Values.ccm.java_opts }}
            - name: JAVA_OPTS
              value: "{{ .Values.ccm.java_opts }}"
      {{- end }}
      {{- if and .Values.sso.enabled .Values.db.service }}
            - name: SSO_ENABLED
              value: "TRUE"
            - name: SSO_CONFIG_SET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ccm.fullname" . }}-db-secret
                  key: sso-config-set
      {{- end }}
      {{- if .Values.keycloak.enabled }}
            - name: KEYCLOAK_ENABLED
              value: "TRUE"
            - name: KEYCLOAK_REALM_NAME
              value: "{{ .Values.keycloak.realmName }}"
            - name: KEYCLOAK_USERNAME
      {{- if .Values.keycloaksrv.enabled }}
              value: "{{ .Values.keycloaksrv.auth.adminUser }}"
      {{- else }}
              value: "{{ .Values.keycloak.username }}"
      {{- end }}
            - name: KEYCLOAK_PASSWORD
      {{- if .Values.global.platform.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-keycloak
                  key: password
      {{- else if .Values.keycloaksrv.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-keycloaksrv
                  key: admin-password
      {{- else }}
            - name: KEYCLOAK_PASSWORD
              value: "{{ .Values.keycloak.password }}"
      {{- end }}
            - name: KEYCLOAK_DASBOARDS_CLIENT_ID
              value: "{{ .Values.keycloak.dashboardsClientID }}"
            - name: KEYCLOAK_DASBOARDS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ccm.fullname" . }}-db-secret
                  key: dashboardsClient-secret
      {{- if .Values.global.platform.enabled }}
            - name: KEYCLOAK_CLIENT_NAME
              value: "{{ .Values.platform.oidc.clientId }}"
      {{- else if .Values.keycloak.service.enabled }}
            - name: KEYCLOAK_CLIENT_NAME
              value: "{{ .Values.keycloak.service.clientName }}"
      {{- end }}
      {{- if .Values.keycloak.urlMapping }}
            - name: KEYCLOAK_URL
              value: {{ .Values.keycloak.urlMapping }}
      {{- else if .Values.global.domain }}
            - name: KEYCLOAK_URL
      {{- if .Values.global.platform.enabled }}
              value: "https://{{ .Values.global.domain }}/auth"
      {{- else }}
      {{- if (eq .Values.ingress.type "route") }}
              value: https://{{ include "ccm.fullname" . }}-keycloaksrv.{{ .Values.global.domain }}
      {{- else }}
              value: https://{{ include "ccm.fullname" . }}-keycloak{{ .Values.ingress.suffix }}.{{ .Values.global.domain }}
      {{- end }}
      {{- end }}
      {{- else if .Values.global.sofySolutionContext }}
            - name: MY_SUB_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-domain
                  key: HOST
            - name: KEYCLOAK_URL
              value: https://{{ include "ccm.fullname" . }}-keycloak.$(MY_SUB_DOMAIN)
      {{- else if and (eq "NodePort" .Values.keycloaksrv.service.type )  .Values.keycloaksrv.service.nodePorts.https .Values.keycloak.service.ipAddress }}
            - name: KEYCLOAK_URL
              value: https://{{ .Values.keycloak.service.ipAddress }}:{{ .Values.keycloaksrv.service.nodePorts.https }}
      {{- else if and (eq "LoadBalancer" .Values.keycloaksrv.service.type ) .Values.keycloaksrv.service.nodePorts.https .Values.keycloak.service.ipAddress }}
            - name: KEYCLOAK_URL
              value: https://{{ .Values.keycloak.service.ipAddress }}:{{ .Values.keycloaksrv.service.nodePorts.https }}
      {{- end }}
      {{- end }}
      {{- if .Values.llama.enabled }}
            - name: LLAMA_URL
              value: http://{{ .Release.Name }}-llama:11434
      {{- end }}
      {{- if .Values.analyticsUserName }}
            - name: ANALYTICS_USER_NAME
              value: {{ .Values.analyticsUserName }}
      {{- end }}
      {{- if .Values.analyticsBootstrapData }}
            - name: ANALYTICS_BOOTSTRAP_DATA
              value: "{{ .Values.analyticsBootstrapData }}"
      {{- end }}
      {{- if .Values.nginx.service }}
            - name: OPENSEARCH_HOSTS
              value: https://{{ include "ccm.fullname" . }}-opensearch:9200
            - name: NGINX_HOSTS
      {{- if and .Values.global.platform.enabled (.Values.global.domain) }}
              value: 'https://{{ .Values.global.domain }}{{ .Values.dashboards.basePath }}'
      {{- else }}
              value: https://{{ include "ccm.fullname" . }}-nginx:5602
      {{- end }}
      {{- if .Values.opensearch.username  }}
            - name: OPENSEARCH_USERNAME
              value: {{ .Values.opensearch.username }}
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ccm.fullname" . }}-opensearch
                  key: opensearch-password
      {{- end }}
      {{- if .Values.dashboards.metrics }}
            - name: METRICS_ENABLED
              value: "TRUE"
      {{- end }}
      {{- if .Values.platform.dataPrepper.enabled }}
            - name: DATA_PREPPER_HOST
              value: {{ include "ccm.fullname" . }}-data-prepper
            - name: DATA_PREPPER_PORT
              value: "2021"
      {{- end }}
      {{- if .Values.logstash.service }}
            - name: LOGSTASH_HOST
              value: {{ include "ccm.fullname" . }}-logstash
            - name: LOGSTASH_PORT
              value: "{{ .Values.logstash.port }}"
      {{- end }}
      {{- if .Values.nginx.urlMapping }}
            - name: NGINX_URL_MAPPING
              value: "{{ .Values.nginx.urlMapping }}"
      {{- else if .Values.global.domain }}
            - name: NGINX_URL_MAPPING
      {{- if .Values.global.platform.enabled }}
              value: 'https://{{ .Values.global.domain }}{{ .Values.dashboards.basePath }}'
      {{- else }}
              value: https://{{ include "ccm.fullname" . }}-nginx{{ .Values.ingress.suffix }}.{{ .Values.global.domain }}
      {{- end }}
      {{- else if .Values.global.sofySolutionContext }}
            - name: MY_SUB_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-domain
                  key: HOST
            - name: NGINX_URL_MAPPING
              value: https://{{ include "ccm.fullname" . }}-nginx.$(MY_SUB_DOMAIN)
      {{- else if .Values.nginx.exposePort }}
            - name: NGINX_EXPOSE_PORT
              value: "{{ .Values.nginx.exposePort }}"
      {{- end }}
      {{- end }}

      {{- if .Values.analytics.service }}
      {{- if .Values.analytics.urlMapping }}
            - name: ANALYTICS_URL
              value: "{{ .Values.analytics.urlMapping }}"
      {{- else if .Values.global.domain }}
            - name: ANALYTICS_URL
      {{- if .Values.global.platform.enabled }}
              value: 'https://{{ .Values.global.domain }}{{ .Values.analytics.basePath }}'
      {{- else }}
              value: https://{{ include "ccm.fullname" . }}-analytics{{ .Values.ingress.suffix }}.{{ .Values.global.domain }}
      {{- end }}
      {{- else if .Values.global.sofySolutionContext }}
            - name: MY_SUB_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-domain
                  key: HOST
            - name: ANALYTICS_URL
              value: https://{{ include "ccm.fullname" . }}-analytics.$(MY_SUB_DOMAIN)
      {{- else if .Values.analytics.exposePort }}
            - name: ANALYTICS_EXPOSE_PORT
              value: "{{ .Values.analytics.exposePort }}"
      {{- end }}
      {{- end }}
      {{-  if .Values.persistence.properties.application.enabled }}
            - name: APPLICATIONS_PROP_ENABLED
              value: "TRUE"
      {{- end }}
      {{-  if .Values.persistence.properties.analytics.enabled }}
            - name: ANALYTICS_PROP_ENABLED
              value: "TRUE"
      {{- end }}
      {{- if .Values.service.urlMapping }}
            - name: SERVER_QUALIFIED_URL_PATH
              value: "{{ .Values.service.urlMapping }}"
      {{- else if .Values.serverQualifiedUrlPath  }}
            - name: SERVER_QUALIFIED_URL_PATH
              value: "{{ .Values.serverQualifiedUrlPath }}"
      {{- end }}
      {{- if .Values.loggingLevel  }}
            - name: LOGGING_LEVEL
              value: "{{ .Values.loggingLevel }}"
      {{- end }}
            - name: CQ_DIAG_OUTPUT
      {{- if .Values.cqDiagOutput  }}
              value: "{{ .Values.cqDiagOutput }}"
      {{- else }}
              value: {{ include "ccm.app-folder" . }}/logs/cqtrace.log
      {{- end }}
      {{- if .Values.cqDiagTrace  }}
            - name: CQ_DIAG_TRACE
              value: "{{ .Values.cqDiagTrace }}"
      {{- end }}
      {{- if .Values.cqDiagReport  }}
            - name: CQ_DIAG_REPORT
              value: "{{ .Values.cqDiagReport }}"
      {{- end }}
          volumeMounts:
      {{- if .Values.persistence.properties.application.enabled  }}
            - name: application-properties
              mountPath: {{ include "ccm.app-folder" . }}/config/update-config/application
      {{- end }}
      {{- if .Values.persistence.properties.analytics.enabled }}
            - name: analytics-properties
              mountPath: {{ include "ccm.app-folder" . }}/config/update-config/analytics
      {{- end }}
      {{- if .Values.winInstall.enabled }}
      {{- if .Values.persistence.enabled }}
            - name: win-install
              mountPath: {{ include "ccm.app-folder" . }}/win-install
      {{- end }}
      {{- end }}
      {{- if .Values.persistence.enabled }}
      {{- if .Values.persistence.ccm.enabled }}
      {{- if .Values.persistence.ccm.data.enabled }}
            - name: data
              mountPath: {{ include "ccm.app-folder" . }}/data
      {{- end }}
      {{- if .Values.persistence.ccm.config.enabled }}
            - name: config
              mountPath: {{ include "ccm.app-folder" . }}/config
      {{- end }}
      {{- if .Values.persistence.ccm.share.enabled }}
            - name: share
              mountPath: {{ include "ccm.app-folder" . }}/share
      {{- end }}
      {{- if .Values.persistence.ccm.logs.enabled }}
            - name: logs
              mountPath: {{ include "ccm.app-folder" . }}/logs
      {{- end }}
      {{- end }}
      {{- end }}
      {{ if .Values.ssl.enabled }}
            - name: ssl-conf
              mountPath: {{ include "ccm.app-folder" . }}/data/ssl
      {{- end }}
      {{ if .Values.persistence.connectOption.ccm }}
            - name: oracle-secure
              mountPath: /opt/tmp/oracle
      {{- end }}
      {{ if .Values.keycloak.enabled }}
      {{- if or (eq .Values.keycloak.jsonFile.enabled true) (eq .Values.global.platform.enabled true) }}
            - name: keycloak-confmap
              mountPath: {{ include "ccm.app-folder" . }}/share/keycloak
      {{- end }}
      {{- end }}
      {{- if eq "IBM" .Values.global.devopsPlanBrand }}
      {{- if .Values.global.licenseMetric}} 
      {{- if (.Capabilities.APIVersions.Has "route.openshift.io/v1") }}
            - name: ibm-license-configmap
              mountPath: {{ include "ccm.app-folder" . }}/data/license
      {{- end }}
      {{- end }}
      {{- end }}
          resources:
            {{- toYaml .Values.ccm.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.persistence.enabled }}
{{- if .Values.persistence.ccm.enabled }}
  volumeClaimTemplates:
{{- if .Values.persistence.ccm.data.enabled }}
  - metadata:
      name: data
      labels:
        app.kubernetes.io/name: {{ include "ccm.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
    {{- with .Values.persistence.annotations  }}
      annotations:
{{ toYaml . | indent 8 }}
    {{- end }}
    spec:
      accessModes:
      {{ toYaml .Values.persistence.ccm.data.accessModes | indent 4 }}
{{- if and (.Values.persistence.ccm.storageClass) (.Capabilities.APIVersions.Has "route.openshift.io/v1") }}
      storageClassName: '{{ .Values.persistence.ccm.storageClass }}'
{{- else if .Values.persistence.storageClass }}
      storageClassName: '{{ .Values.persistence.storageClass }}'
{{- else if .Values.global.persistence.rwxStorageClass }}
      storageClassName: {{ .Values.global.persistence.rwxStorageClass | quote }}
{{- else if .Values.global.persistence.rwoStorageClass }}
      storageClassName: {{ .Values.global.persistence.rwoStorageClass | quote }}
{{- end }}
      resources:
        requests:
          storage: "{{ .Values.persistence.ccm.data.size }}"
{{- end }}

{{- if .Values.persistence.ccm.logs.enabled }}
  - metadata:
      name: logs
      labels:
        app.kubernetes.io/name: {{ include "ccm.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
    {{- with .Values.persistence.annotations  }}
      annotations:
{{ toYaml . | indent 8 }}
    {{- end }}
    spec:
      accessModes:
      {{ toYaml .Values.persistence.ccm.logs.accessModes | indent 4 }}
{{- if and (.Values.persistence.ccm.storageClass) (.Capabilities.APIVersions.Has "route.openshift.io/v1") }}
      storageClassName: '{{ .Values.persistence.ccm.storageClass }}'
{{- else if .Values.persistence.storageClass }}
      storageClassName: '{{ .Values.persistence.storageClass }}'
{{- else if .Values.global.persistence.rwxStorageClass }}
      storageClassName: {{ .Values.global.persistence.rwxStorageClass | quote }}
{{- else if .Values.global.persistence.rwoStorageClass }}
      storageClassName: {{ .Values.global.persistence.rwoStorageClass | quote }}
{{- end }}
      resources:
        requests:
          storage: "{{ .Values.persistence.ccm.logs.size }}"
{{- end }}
{{- end }}
{{- end }}
{{- end -}}
