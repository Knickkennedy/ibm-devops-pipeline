  case_sensitive: false
  host_regex: true
  prefix_regex: true
  rewrite: ""
  bypass_auth: {{ .Values.disableAccessControl }}
  timeout_ms: 10000
  service: {{ include "ccm.fullname" . }}.{{ .Values.global.domain }}
---
