{{- if .Values.global.sofySolutionContext }}
{{- if .Values.global.domain }}
---
apiVersion: getambassador.io/v3alpha1
kind: Mapping
metadata:
  name: crd-{{ include "ccm.fullname" . }}
spec:
  prefix: /.*
  host: {{ include "ccm.fullname" . }}.{{ .Values.global.domain }}
  ambassador_id: [ '{{ .Values.global.emissaryID }}' ]
  case_sensitive: false
  host_regex: true
  prefix_regex: true
  rewrite: ""
  timeout_ms: 10000
  bypass_auth: {{ .Values.disableAccessControl }}
  service: https://{{ include "ccm.fullname" . }}:8190
  resolver: devopsplanendpoint
  load_balancer:
    policy: ring_hash
    cookie:
      name: {{ include "ccm.fullname" . }}-affinity-cookie
      ttl: 86400s
---
apiVersion: getambassador.io/v3alpha1
kind: Mapping
metadata:
  name: crd-{{ include "ccm.fullname" . }}-dropwww
spec:
  prefix: /.*
  host: www.{{ include "ccm.fullname" . }}.{{ .Values.global.domain }}
