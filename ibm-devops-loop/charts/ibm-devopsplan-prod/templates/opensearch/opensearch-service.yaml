{{- if .Values.opensearch.service -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ccm.fullname" . }}-opensearch
  labels:
    {{- include "ccm.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  ports:
    - name: performace
      port: 9600
      protocol: TCP
      targetPort: 9600
    - name: http
      port: 9200
      protocol: TCP
      targetPort: 9200
  selector:
    app.kubernetes.io/name: {{ include "ccm.name" . }}-opensearch
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end -}}
