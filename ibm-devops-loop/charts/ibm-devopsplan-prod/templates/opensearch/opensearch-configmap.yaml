{{- if .Values.opensearch.service -}}
{{- if .Values.global.platform.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ccm.fullname" . }}-opensearch-configmap
  labels:
    {{- include "ccm.labels" . | nindent 4 }}
data:
  config.yml: |-
    _meta:
      type: "config"
      config_version: 2

    config:
      dynamic:
        kibana:
          multitenancy_enabled: true
          private_tenant_enabled: true
          default_tenant: "Private"
          server_username: kibanaserver
          index: '.kibana'
        do_not_fail_on_forbidden: false
        http:
          anonymous_auth_enabled: false
        authc:
          basic_internal_auth_domain:
            description: "Authenticate via HTTP Basic against internal users database"
            http_enabled: true
            transport_enabled: true
            order: 0
            http_authenticator:
              type: "basic"
              challenge: false
            authentication_backend:
              type: "internal"

          oidc_auth_domain:
            description: "Authenticate via OIDC (OpenID Connect)"
            http_enabled: true
            transport_enabled: true
            order: 1
            http_authenticator:
              type: "openid"
              challenge: true
              config:
                subject_key: "preferred_username"
                roles_key: "roles"
                openid_connect_url: "https://{{ .Values.global.domain }}/auth/realms/{{ .Values.keycloak.realmName }}/.well-known/openid-configuration"
                client_id: {{ .Values.platform.opensearch.oidc.clientId }}
                client_secret: "" # replace with your actual client secret
            authentication_backend:
              type: "noop"
{{- end }}
{{- end -}}
