{{- if not .Values.global.platform.enabled }}
{{- if .Values.keycloak.service.enabled }}
{{- if or .Values.global.sofySolutionContext (and .Values.ingress.enabled (eq .Values.ingress.type "mapping")) }}
apiVersion: getambassador.io/v3alpha1
kind: Mapping
metadata:
  name: {{ include "ccm.fullname" . }}-keycloak
spec:
{{- if .Values.global.ambassadorID }}
  ambassador_id: [ '{{ .Values.global.emissaryID }}' ]
{{- end }}
  bypass_auth: {{ .Values.disableAccessControl }}
  case_sensitive: false
  host_regex: true
  host: {{ include "ccm.fullname" . }}-keycloak{{ .Values.ingress.suffix }}.{{ default ".*" .Values.global.domain }}
  prefix_regex: true
  prefix: /.*
  resolver: {{ include "ccm.fullname" . }}
  rewrite: ""
  service: http://{{ template "keycloaksrv.common.names.fullname" . }}-keycloaksrv:80
  timeout_ms: {{ .Values.keycloak.service.ingressMapping.timeout_ms }}
{{- end }}
{{- end }}
{{- end }}
