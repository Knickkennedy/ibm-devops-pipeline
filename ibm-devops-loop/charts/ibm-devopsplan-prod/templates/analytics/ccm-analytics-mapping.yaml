{{- if .Values.analytics.service -}}
{{- if or .Values.global.sofySolutionContext (and .Values.ingress.enabled (eq .Values.ingress.type "mapping")) }}
apiVersion: getambassador.io/v3alpha1
kind: Mapping
metadata:
  name: {{ include "ccm.fullname" . }}-analytics
spec:
{{- if .Values.global.ambassadorID }}
  ambassador_id: [ '{{ .Values.global.emissaryID }}' ]
{{- end }}
  bypass_auth: {{ .Values.disableAccessControl }}
  case_sensitive: false
  host_regex: true
{{- if .Values.global.platform.enabled }}
  host: {{ .Values.global.domain }}
  prefix: '{{ .Values.analytics.basePath }}.*'
  service: http://{{ include "ccm.fullname" . }}-analytics:8291
{{- else }}
  host: {{ include "ccm.fullname" . }}-analytics{{ .Values.ingress.suffix }}.{{ default ".*" .Values.global.domain }}
  prefix: /.*
  resolver: {{ include "ccm.fullname" . }}
  service: https://{{ include "ccm.fullname" . }}-analytics:8290
{{- end }}
  prefix_regex: true
  rewrite: ""
  timeout_ms: {{ .Values.analytics.ingressMapping.timeout_ms }}
  connect_timeout_ms: {{ .Values.analytics.ingressMapping.connect_timeout_ms }}
{{- end }}
{{- end }}
