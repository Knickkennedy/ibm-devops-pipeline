{{- if not .Values.backupRestore.enabled}}
{{- if .Values.persistence.enabled }}
{{- if .Values.persistence.analytics.enabled -}}
---
{{- if and .Values.persistence.analytics.config.enabled (not .Values.persistence.analytics.config.existingClaim) }}
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: config-{{ template "ccm.fullname" . }}-analytics
{{- with .Values.analytics.annotations  }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
  labels:
{{ include "ccm.labels" . | indent 4 }}
spec:
  accessModes:
  {{ toYaml .Values.persistence.analytics.config.accessModes | indent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.analytics.config.size | quote }}
{{- if .Values.persistence.analytics.storageClass }}
  storageClassName: '{{ .Values.persistence.analytics.storageClass }}'
{{- else if .Values.persistence.storageClass }}
  storageClassName: '{{ .Values.persistence.storageClass }}'
{{- else if .Values.global.persistence.rwoStorageClass }}
  storageClassName: {{ .Values.global.persistence.rwoStorageClass | quote }}
{{- else if .Values.global.persistence.rwxStorageClass }}
  storageClassName: {{ .Values.global.persistence.rwxStorageClass | quote }}
{{- end }}
{{- end }}

---
{{- if and .Values.persistence.analytics.share.enabled (not .Values.persistence.analytics.share.existingClaim) }}
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: share-{{ template "ccm.fullname" . }}-analytics
{{- with .Values.analytics.annotations  }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
  labels:
{{ include "ccm.labels" . | indent 4 }}
spec:
  accessModes:
  {{ toYaml .Values.persistence.analytics.share.accessModes | indent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.analytics.share.size | quote }}
{{- if .Values.persistence.analytics.storageClass }}
  storageClassName: '{{ .Values.persistence.analytics.storageClass }}'
{{- else if .Values.persistence.storageClass }}
  storageClassName: '{{ .Values.persistence.storageClass }}'
{{- else if .Values.global.persistence.rwoStorageClass }}
  storageClassName: {{ .Values.global.persistence.rwoStorageClass | quote }}
{{- else if .Values.global.persistence.rwxStorageClass }}
  storageClassName: {{ .Values.global.persistence.rwxStorageClass | quote }}
{{- end }}
{{- end }}

{{- end }}
{{- end -}}
{{- end -}}
