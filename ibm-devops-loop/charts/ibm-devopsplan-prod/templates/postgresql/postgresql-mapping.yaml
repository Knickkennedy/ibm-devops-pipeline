{{- if not .Values.global.platform.enabled }}
{{- if or (eq .Values.postgresql.enabled true) (and (eq .Values.ingress.type "mapping") (eq .Values.control.enabled true) (not .Values.control.postgresql.host)) -}}
{{- if or .Values.global.sofySolutionContext (and .Values.ingress.enabled (eq .Values.ingress.type "mapping")) }}
apiVersion: getambassador.io/v3alpha1
kind: Mapping
metadata:
  name: {{ include "ccm.fullname" . }}-postgresql
spec:
{{- if .Values.global.ambassadorID }}
  ambassador_id: [ '{{ .Values.global.emissaryID }}' ]
{{- end }}
  bypass_auth: {{ .Values.disableAccessControl }}
  case_sensitive: false
  host_regex: true
{{- if .Values.global.platform.enabled }}
  host: {{ .Values.global.domain }}
  prefix: '/plan/postgresql.*'
{{- else }}
  host: {{ include "ccm.fullname" . }}-postgresql{{ .Values.ingress.suffix }}.{{ default ".*" .Values.global.domain }}
  prefix: /.*
  resolver: {{ include "ccm.fullname" . }}
{{- end }}
  prefix_regex: true
  rewrite: ""
  service: https://{{ include "ccm.fullname" . }}-postgresql:5432
  timeout_ms: {{ .Values.postgresql.service.ingressMapping.timeout_ms }}
{{- end }}
{{- end }}
{{- end }}
