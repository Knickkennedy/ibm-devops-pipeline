{{- if .Values.search.service -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ccm.fullname" . }}-search
  labels:
    {{- include "ccm.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "ccm.fullname" . }}-search
  replicas: {{ .Values.search.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ccm.name" . }}-search
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/managed-by: {{ .Release.Service }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ccm.name" . }}-search
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
      annotations:
  {{- if eq "IBM" .Values.global.devopsPlanBrand }}
        productName: {{ .Values.annotations.ibm.productName }}
        productID: {{ .Values.annotations.ibm.productID }}
        productVersion: {{ .Values.annotations.ibm.productVersion }}
        productMetric: {{ .Values.annotations.ibm.productMetric }}
        productChargedContainers: {{ .Values.annotations.ibm.productChargedContainers }}
  {{ else }}
        productName: {{ .Values.annotations.hcl.productName }}
        productVersion: {{ .Values.annotations.hcl.productVersion }}
  {{- end }}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: {{ .Values.search.nodeAffinity.key }}
                operator: In
                values:
                - {{ .Values.search.nodeAffinity.values }}
  {{- if .Values.search.podAffinity.enabled }}
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                - {{ include "ccm.fullname" . }}
            topologyKey: "kubernetes.io/hostname"
  {{- end }}
  {{- if .Values.search.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.search.topologySpreadConstraints.maxSkew }}
          topologyKey: {{ .Values.search.topologySpreadConstraints.topologyKey }}
          whenUnsatisfiable: {{ .Values.search.topologySpreadConstraints.whenUnsatisfiable }}
          labelSelector:
            matchLabelKeys:
              app.kubernetes.io/name: {{ include "ccm.name" . }}-search
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- end }}
  {{- if or (.Values.global.imagePullSecret) (.Values.global.imagePullSecrets) }}
      imagePullSecrets:
  {{- if .Values.global.imagePullSecret }}
      - name: {{ .Values.global.imagePullSecret }}
  {{- end }}
      {{- range .Values.global.imagePullSecrets }}
      - name: {{ . }}
      {{- end }}
  {{- end }}
      securityContext:
  {{ if .Values.nonRootUser }}
        runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
  {{- end }}
  {{- else }}
        fsGroup: 2000
  {{- end }}
      volumes:
      {{- if .Values.persistence.enabled }}
      {{- if .Values.persistence.ccm.enabled }}
      {{- if .Values.persistence.ccm.config.enabled }}
        - name: sharedconfig
          persistentVolumeClaim:
      {{- if .Values.persistence.ccm.config.existingClaim }}
            claimName: .Values.persistence.ccm.config.existingClaim
      {{- else }}
            claimName: config-{{ include "ccm.fullname" . }}
      {{- end }}
      {{- else }}
          emptyDir: {}
      {{- end }}
      {{- if .Values.persistence.ccm.share.enabled }}
        - name: shareddata
          persistentVolumeClaim:
      {{- if .Values.persistence.ccm.share.existingClaim }}
            claimName: .Values.persistence.ccm.share.existingClaim
      {{- else }}
            claimName: share-{{ include "ccm.fullname" . }}
      {{- end }}
      {{- else }}
          emptyDir: {}
      {{- end }}
      {{- end }}
      {{- if .Values.persistence.connectOption.ccm }}
        - name: oracle-secure
          hostPath:
            path: "{{ .Values.persistence.connectOption.path }}"
      {{- end }}
      {{- end }}
      {{- if .Values.persistence.enabled }}
      {{- if .Values.persistence.search.enabled }}
      {{- if .Values.persistence.search.config.enabled }}
        - name: config
          persistentVolumeClaim:
      {{- if .Values.persistence.search.config.existingClaim }}
            claimName: .Values.persistence.search.config.existingClaim
      {{- else }}
            claimName: config-{{ include "ccm.fullname" . }}-search
      {{- end }}
      {{- else }}
          emptyDir: {}
      {{- end }}
      {{- if .Values.persistence.search.share.enabled }}
        - name: share
          persistentVolumeClaim:
      {{- if .Values.persistence.search.share.existingClaim }}
            claimName: .Values.persistence.search.share.existingClaim
      {{- else }}
            claimName: share-{{ include "ccm.fullname" . }}-search
      {{- end }}
      {{- else }}
          emptyDir: {}
      {{- end }}
      {{- end }}
      {{- end }}
      {{ if .Values.ssl.enabled }}
        - name: ssl-conf
          configMap:
            name: "{{ .Values.ssl.configMapName }}"
      {{- end }}
      {{ if .Values.persistence.enabled }}
      {{- if .Values.persistence.connectOption.ccm }}
        - name: oracle-secure
          hostPath:
            path: "{{ .Values.persistence.connectOption.path }}"
      {{- end }}
      {{- end }}
      {{ if .Values.keycloak.enabled }}
      {{ if .Values.keycloak.jsonFile.enabled }}
        - name: keycloak-confmap
          configMap:
            name: "{{ .Values.keycloak.jsonFile.configMapName }}"
      {{- end }}
      {{- end }}
      {{ if .Values.persistence.enabled }}
      {{- if .Values.persistence.ccm.enabled }}
        - name: configmap-data
          configMap:
            name: {{ include "ccm.fullname" . }}-configmap
            defaultMode: 0700
      {{- end }}
      {{- end }}
      {{- if .Values.persistence.properties.application.enabled }}
        - name: application-properties
          configMap:
            name: {{ include "ccm.fullname" . }}-application-configmap
            defaultMode: 0777
      {{- end }}
      {{- if .Values.persistence.properties.analytics.enabled }}
        - name: analytics-properties
          configMap:
            name: {{ include "ccm.fullname" . }}-analytics-configmap
            defaultMode: 0777
      {{- end }}
  {{- if .Values.priorityClassName }}
      priorityClassName: {{ include "ccm.fullname" . }}-{{ .Values.priorityClassName }}
  {{- end }}
      initContainers:
        - name: init-ccm-readiness
          image: "curlimages/curl:7.76.1"
          env:
          - name: CCM_SERVICE_URL
      {{- if .Values.global.platform.enabled }}
            value: http://{{ include "ccm.fullname" . }}:8191/plan/
      {{- else }}
            value: https://{{ include "ccm.fullname" . }}:8190/
      {{- end }}       
          command: ["sh", "-c", "while [[ $(curl -s -k -o /dev/null -w '%{http_code}' $CCM_SERVICE_URL) != 200 ]]; do sleep 1; echo $(date +'%Y-%m-%d_%H%M%S'): Devopsplan service $(CCM_SERVICE_URL) is not ready; done"]
      {{- if .Values.search.initResources }}
          resources: {{- toYaml .Values.search.initResources | nindent 12 }}
      {{- end }}
          securityContext:
            runAsNonRoot: true
      {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
##            fsGroup: {{ .Values.securityContext.fsGroup }}
      {{- end }}
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
      {{ if .Values.persistence.enabled }}
      {{- if .Values.persistence.search.enabled }}
      {{- if or (eq .Values.persistence.search.data.enabled true) (eq .Values.persistence.search.config.enabled true) }}
        - name: prepare-config-volume
      {{- if .Values.image.repoDigests }}
          image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.image.repository }}@{{ .Values.image.tag }}"
      {{- else }}
          image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
      {{- end }}
      {{- if .Values.search.initResources }}
          resources: {{- toYaml .Values.search.initResources | nindent 12 }}
      {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
      {{ if .Values.nonRootUser }}
          securityContext:
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
       {{- end }}
          command:
            - /work/data-config-properties.sh
          volumeMounts:
      {{- if .Values.persistence.properties.application.enabled  }}
            - name: application-properties
              mountPath: {{ include "ccm.app-folder" . }}/config/update-config/application
      {{- end }}
      {{- if .Values.persistence.properties.analytics.enabled }}
            - name: analytics-properties
              mountPath: {{ include "ccm.app-folder" . }}/config/update-config/analytics
      {{- end }}
      {{- if .Values.persistence.search.data.enabled }}
            - name: data
              mountPath: /tmp/data
      {{- end }}
      {{- if .Values.persistence.search.config.enabled }}
            - name: config
              mountPath: /tmp/config
      {{- end }}
      {{- if .Values.persistence.search.share.enabled }}
            - name: share
              mountPath: /tmp/share
      {{- end }}
      {{- end }}
      {{- end }}
      {{- end }}
    {{- with .Values.hostAliases }}
      hostAliases:
{{ toYaml . | indent 6 }}
    {{- end }}
      hostname:  "{{ .Values.search.hostname }}"
      serviceAccount: {{ include "ccm.fullname" . }}-sa
      containers:
        - name: {{ .Chart.Name }}-search
      {{- if .Values.image.repoDigests }}
          image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.image.repository }}@{{ .Values.image.tag }}"
      {{- else }}
          image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
      {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
      {{ if .Values.nonRootUser }}      
          securityContext:
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
      {{- end }}
          ports:
            - name: https
              containerPort: {{ .Values.search.targetPort }}
              protocol: TCP
      {{- if semverCompare ">=1.16-0" .Capabilities.KubeVersion.Version }}
      {{- if .Values.probes.startup.search.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.http.search.path }}
              port: {{ .Values.service.targetPort }}
              scheme: {{ .Values.probes.http.search.scheme }}
            initialDelaySeconds: {{ .Values.probes.startup.search.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.search.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.search.timeoutSeconds }}
            successThreshold: {{ .Values.probes.startup.search.successThreshold }}
            failureThreshold: {{ .Values.probes.startup.search.failureThreshold }}
      {{- end }}
      {{- end }}
      {{- if .Values.probes.liveness.search.enabled }}
          livenessProbe:
            exec:
              command:
              - /bin/bash
              - -c
              - if [[ -z "$(pgrep -a java  | grep devopsplan-rest-server | awk '{ print $1; }')" ]]; then exit 1; fi
            initialDelaySeconds: {{ .Values.probes.liveness.search.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.search.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.search.timeoutSeconds }}
            successThreshold: {{ .Values.probes.liveness.search.successThreshold }}
            failureThreshold: {{ .Values.probes.liveness.search.failureThreshold }}
      {{- end }}
      {{- if .Values.probes.readiness.search.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.http.search.path }}
              port: {{ .Values.service.targetPort }}
              scheme: {{ .Values.probes.http.search.scheme }}
            initialDelaySeconds: {{ .Values.probes.readiness.search.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.search.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.search.timeoutSeconds }}
            successThreshold: {{ .Values.probes.readiness.search.successThreshold }}
            failureThreshold: {{ .Values.probes.readiness.search.failureThreshold }}
      {{- end }}
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt-secret
      {{- if eq "IBM" .Values.global.devopsPlanBrand }}
            - name: DEVOPS_PLAN_BRAND
              value: "IBM"
      {{- else }}
            - name: DEVOPS_PLAN_BRAND
              value: "HCL"
      {{- end }}       
            - name: IS_SEARCH
              value: "TRUE"
            - name: CQ_DATABASES
              value: {{ include "ccm.app-folder" . }}/shareddata
            - name: KUBERNETES
              value: "TRUE"
      {{ if .Values.db.service }}
            - name: DB_CONNECTION_SET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ccm.fullname" . }}-db-secret
                  key: db-connection-set
      {{- end }}
      {{- if .Values.timeZone }}
            - name: TIME_ZONE
              value: {{ .Values.timeZone }}
      {{- end }}
      {{ if .Values.ssl.enabled }}
            - name: SSL_KEY_ALIAS
              value: "{{ .Values.ssl.keyAlias }}"
            - name: SSL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ccm.fullname" . }}-db-secret
                  key: ssl-password
      {{- end }}
      {{- if .Values.deployment.mode }}
            - name: DEPLOYMENT_MODE
              value: "{{ .Values.deployment.mode }}"
      {{- end }}
      {{- if .Values.deployment.userpass }}
            - name: DEPLOYMENT_USERPASS
              value: "{{ .Values.deployment.userpass }}"
      {{- end }}
      {{- if .Values.feedback.toEmailaddress }}
            - name: TO_EMAIL_ADDRESS
              value: "{{ .Values.feedback.toEmailaddress }}"
      {{- end }}
      {{- if .Values.feedback.fromEmailaddress }}
            - name: FROM_EMAIL_ADDRESS
              value: "{{ .Values.feedback.fromEmailaddress }}"
      {{- end }}
      {{- if .Values.spring.datastore.enabled }}
            - name: SPRING_DATASTORE
              value: "TRUE"
      {{- if .Values.spring.datastore.url }}
            - name: SPRING_DATASTORE_URL
              value: "{{ .Values.spring.datastore.url }}"
      {{- else if .Values.postgresql.enabled }}
            - name: SPRING_DATASTORE_URL
      {{ if .Values.persistence.postgresql.initPostgres }}
              value: jdbc:postgresql://{{ include "plan.fullname" . }}-postgresql:5432/postgres
      {{- else }}
              value: jdbc:postgresql://{{ include "plan.fullname" . }}-postgresql:5432/{{ .Values.tenant.datastore.dbname }}
      {{- end }}
      {{- end }}
            - name: SPRING_DATASTORE_USERNAME
              value: "{{ .Values.spring.datastore.username }}"
            - name: SPRING_DATASTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "plan.fullname" . }}-postgresql
                  key: spring-datastore-password
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "{{ .Values.spring.jpaHibernate.ddlAuto }}"
      {{- end }}
      {{- if or (.Values.spring.mail.host) (.Values.global.platform.smtp.host) }}
            - name: SPRING_MAIL_HOST
      {{- if .Values.global.platform.smtp.host }}
              value: "{{ .Values.global.platform.smtp.host }}"
      {{- else if .Values.spring.mail.host }}
              value: "{{ .Values.spring.mail.host }}"
      {{- end }}
      {{- end }}
      {{- if or (.Values.spring.mail.port) (.Values.global.platform.smtp.port) }}
            - name: SPRING_MAIL_PORT  
      {{- if .Values.global.platform.smtp.port }}
              value: "{{ .Values.global.platform.smtp.port }}"
      {{- else if .Values.spring.mail.port }}
              value: "{{ .Values.spring.mail.port }}"
      {{- end }}
      {{- end }}
      {{- if or (.Values.spring.mail.username) (.Values.global.platform.smtp.username) }}
            - name: SPRING_MAIL_USERNAME
      {{- if .Values.global.platform.smtp.username }}
              value: "{{ .Values.global.platform.smtp.username }}"
      {{- else if .Values.spring.mail.username }}
              value: "{{ .Values.spring.mail.username }}"
      {{- end }}
      {{- end }}
      {{- if or (.Values.spring.mail.password) (.Values.global.platform.smtp.password) }}
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ccm.fullname" . }}-db-secret
                  key: spring-mail-password
      {{- end }}
      {{- if .Values.global.platform.smtp.startTLS }}
            - name: SPRING_MAIL_STARTTLS
              value: "{{ .Values.global.platform.smtp.startTLS }}"
      {{- end }}
      {{- if .Values.global.platform.smtp.smtps }}
            - name: SPRING_MAIL_SMTPS
              value: "{{ .Values.global.platform.smtp.smtps }}"
      {{- end }}
      {{- if .Values.tenant.datastore.enabled }}
            - name: TENANT_DATASTORE
              value: "TRUE"
            - name: TENANT_DATASTORE_VENDOR
              value: "{{ .Values.tenant.datastore.vendor }}"
      {{- if .Values.tenant.datastore.server }}
            - name: TENANT_DATASTORE_SERVER
              value: "{{ .Values.tenant.datastore.server }}"
      {{- else if .Values.postgresql.enabled }}
            - name: TENANT_DATASTORE_SERVER
              value: {{ include "plan.fullname" . }}-postgresql
      {{- end }}
            - name: TENANT_DATASTORE_DB_NAME
              value: "{{ .Values.tenant.datastore.dbname }}"
            - name: TENANT_DATASTORE_DBO
              value: "{{ .Values.tenant.datastore.username }}"
            - name: TENANT_DATASTORE_DBO_PW
              valueFrom:
                secretKeyRef:
                  name: {{ include "plan.fullname" . }}-postgresql
                  key: tenant-datastore-password
            - name: TENANT_REGISTRATION_CODE
              value: "{{ .Values.tenant.registration.code }}"
      {{- if or (.Values.tenant.email.fromaddress) (.Values.global.platform.smtp.sender) }}
            - name: TENANT_EMAIL_FROM_ADDRESS
      {{- if .Values.global.platform.smtp.sender }}
              value: "{{ .Values.global.platform.smtp.sender }}"
      {{- else if .Values.tenant.email.fromaddress }}
              value: "{{ .Values.tenant.email.fromaddress }}"
      {{- end }}
      {{- end }}
            - name: TENANT_DATASTORE_TOKEN
              value: "{{ .Values.tenant.datastore.token }}"
      {{- if .Values.tenant.datastore.secret }}      
            - name: TENANT_DATASTORE_SECRET
              value: "{{ .Values.tenant.datastore.secret }}"
      {{- end }}
      {{- end }}
      {{- if .Values.search.java_opts }}
            - name: JAVA_OPTS
              value: "{{ .Values.search.java_opts }}"
      {{- end }}
      {{- if and .Values.sso.enabled .Values.db.service }}
            - name: SSO_ENABLED
              value: "TRUE"
            - name: SSO_CONFIG_SET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ccm.fullname" . }}-db-secret
                  key: sso-config-set
      {{- end }}
      {{- if .Values.keycloak.enabled }}
            - name: KEYCLOAK_ENABLED
              value: "TRUE"
            - name: KEYCLOAK_REALM_NAME
              value: "{{ .Values.keycloak.realmName }}"
            - name: KEYCLOAK_USERNAME
              value: "{{ .Values.keycloak.username }}"
            - name: KEYCLOAK_PASSWORD
              value: "{{ .Values.keycloak.password }}"
            - name: KEYCLOAK_DASBOARDS_CLIENT_ID
              value: "{{ .Values.keycloak.dashboardsClientID }}"
            - name: KEYCLOAK_DASBOARDS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ccm.fullname" . }}-db-secret
                  key: dashboardsClient-secret
      {{- if not .Values.global.platform.enabled }}
      {{- if .Values.keycloak.service.enabled }}
            - name: KEYCLOAK_CLIENT_NAME
              value: "{{ .Values.keycloak.service.clientName }}"
      {{- end }}
      {{- end }}
      {{- if .Values.keycloak.urlMapping }}
            - name: KEYCLOAK_URL
              value: {{ .Values.keycloak.urlMapping }}
      {{- else if .Values.global.domain }}
            - name: KEYCLOAK_URL
      {{- if .Values.global.platform.enabled }}
              value: "https://{{ .Values.global.domain }}/auth"
      {{- else }}
      {{- if (eq .Values.ingress.type "route") }}
              value: https://{{ include "ccm.fullname" . }}-keycloaksrv.{{ .Values.global.domain }}
      {{- else }}
              value: https://{{ include "ccm.fullname" . }}-keycloak{{ .Values.ingress.suffix }}.{{ .Values.global.domain }}
      {{- end }}
      {{- end }}
      {{- else if .Values.global.sofySolutionContext }}
            - name: MY_SUB_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-domain
                  key: HOST
            - name: KEYCLOAK_URL
              value: https://{{ include "ccm.fullname" . }}-keycloak.$(MY_SUB_DOMAIN)
      {{- else if and (eq "NodePort" .Values.keycloak.service.type )  .Values.keycloak.service.exposePort .Values.keycloak.service.ipAddress }}
            - name: KEYCLOAK_URL
              value: https://{{ .Values.keycloak.service.ipAddress }}:{{ .Values.keycloak.service.exposePort }}
      {{- else if and (eq "LoadBalancer" .Values.keycloak.service.type ) .Values.keycloak.service.exposePort .Values.keycloak.service.ipAddress }}
            - name: KEYCLOAK_URL
              value: https://{{ .Values.keycloak.service.ipAddress }}:{{ .Values.keycloak.service.exposePort }}
      {{- end }}
      {{- end }}
      {{- if .Values.analyticsUserName }}
            - name: ANALYTICS_USER_NAME
              value: {{ .Values.analyticsUserName }}
      {{- end }}
      {{- if .Values.analyticsBootstrapData }}
            - name: ANALYTICS_BOOTSTRAP_DATA
              value: "{{ .Values.analyticsBootstrapData }}"
      {{- end }}
      {{- if .Values.nginx.service }}
            - name: OPENSEARCH_HOSTS
              value: https://{{ include "ccm.fullname" . }}-opensearch:9200
            - name: NGINX_HOSTS
      {{- if and .Values.global.platform.enabled (.Values.global.domain) }}
              value: 'https://{{ .Values.global.domain }}{{ .Values.dashboards.basePath }}'
      {{- else }}
              value: https://{{ include "ccm.fullname" . }}-nginx:5602
      {{- end }}
      {{- if .Values.opensearch.username }}
            - name: OPENSEARCH_USERNAME
              value: {{ .Values.opensearch.username }}
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ccm.fullname" . }}-opensearch
                  key: opensearch-password
      {{- end }}
      {{- if .Values.platform.dataPrepper.enabled }}
            - name: DATA_PREPPER_HOST
              value: {{ include "ccm.fullname" . }}-data-prepper
            - name: DATA_PREPPER_PORT
              value: "2021"
      {{- end }}
      {{- if .Values.logstash.service }}
            - name: LOGSTASH_HOST
              value: {{ include "ccm.fullname" . }}-logstash
            - name: LOGSTASH_PORT
              value: "{{ .Values.logstash.port }}"
      {{- end }}
      {{- if .Values.nginx.urlMapping }}
            - name: NGINX_URL_MAPPING
              value: "{{ .Values.nginx.urlMapping }}"
      {{- else if .Values.global.domain }}
            - name: NGINX_URL_MAPPING
      {{- if .Values.global.platform.enabled }}
              value: 'https://{{ .Values.global.domain }}{{ .Values.dashboards.basePath }}'
      {{- else }}
              value: https://{{ include "ccm.fullname" . }}-nginx{{ .Values.ingress.suffix }}.{{ .Values.global.domain }}
      {{- end }}
      {{- else if .Values.global.sofySolutionContext }}
            - name: MY_SUB_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-domain
                  key: HOST
            - name: NGINX_URL_MAPPING
              value: https://{{ include "ccm.fullname" . }}-nginx.$(MY_SUB_DOMAIN)
      {{- else if .Values.nginx.exposePort }}
            - name: NGINX_EXPOSE_PORT
              value: "{{ .Values.nginx.exposePort }}"
      {{- end }}
      {{- end }}

      {{- if .Values.analytics.service }}
      {{- if .Values.analytics.urlMapping }}
            - name: ANALYTICS_URL
              value: "{{ .Values.analytics.urlMapping }}"
      {{- else if .Values.global.domain }}
            - name: ANALYTICS_URL
      {{- if .Values.global.platform.enabled }}
              value: 'https://{{ .Values.global.domain }}{{ .Values.analytics.basePath }}'
      {{- else }}
              value: https://{{ include "ccm.fullname" . }}-analytics{{ .Values.ingress.suffix }}.{{ .Values.global.domain }}
      {{- end }}
      {{- else if .Values.global.sofySolutionContext }}
            - name: MY_SUB_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-domain
                  key: HOST
            - name: ANALYTICS_URL
              value: https://{{ include "ccm.fullname" . }}-analytics.$(MY_SUB_DOMAIN)
      {{- else if .Values.analytics.exposePort }}
            - name: ANALYTICS_EXPOSE_PORT
              value: "{{ .Values.analytics.exposePort }}"
      {{- end }}
      {{- end }}
      {{-  if .Values.persistence.properties.application.enabled }}
            - name: APPLICATIONS_PROP_ENABLED
              value: "TRUE"
      {{- end }}
      {{-  if .Values.persistence.properties.analytics.enabled }}
            - name: ANALYTICS_PROP_ENABLED
              value: "TRUE"
      {{- end }}
      {{- if .Values.service.urlMapping }}
            - name: SERVER_QUALIFIED_URL_PATH
              value: "{{ .Values.service.urlMapping }}"
      {{- else if .Values.serverQualifiedUrlPath  }}
            - name: SERVER_QUALIFIED_URL_PATH
              value: "{{ .Values.serverQualifiedUrlPath }}"
      {{- end }}
      {{- if .Values.search.loggingLevel  }}
            - name: LOGGING_LEVEL
              value: "{{ .Values.search.loggingLevel }}"
      {{- end }}
            - name: CQ_DIAG_OUTPUT
      {{- if .Values.search.cqDiagOutput  }}
              value: "{{ .Values.search.cqDiagOutput }}"
      {{- else }}
              value: {{ include "ccm.app-folder" . }}/logs/cqtrace.log
      {{- end }}
      {{- if .Values.search.cqDiagTrace  }}
            - name: CQ_DIAG_TRACE
              value: "{{ .Values.search.cqDiagTrace }}"
      {{- end }}
      {{- if .Values.search.cqDiagReport  }}
            - name: CQ_DIAG_REPORT
              value: "{{ .Values.search.cqDiagReport }}"
      {{- end }}
          volumeMounts:
      {{- if .Values.persistence.ccm.share.enabled }}
            - name: shareddata
              mountPath: {{ include "ccm.app-folder" . }}/shareddata
      {{- end }}
      {{- if .Values.persistence.ccm.config.enabled }}
            - name: sharedconfig
              mountPath: {{ include "ccm.app-folder" . }}/sharedconfig
      {{- end }}
      {{ if .Values.persistence.connectOption.ccm }}
            - name: oracle-secure
              mountPath: /opt/tmp/oracle
      {{- end }}
      {{- if .Values.persistence.enabled }}
      {{- if .Values.persistence.search.enabled }}
      {{- if .Values.persistence.search.data.enabled }}
            - name: data
              mountPath: {{ include "ccm.app-folder" . }}/data
      {{- end }}
      {{- if .Values.persistence.search.config.enabled }}
            - name: config
              mountPath: {{ include "ccm.app-folder" . }}/config
      {{- end }}
      {{- if .Values.persistence.search.share.enabled }}
            - name: share
              mountPath: {{ include "ccm.app-folder" . }}/share
      {{- end }}
      {{- if .Values.persistence.search.logs.enabled }}
            - name: logs
              mountPath: {{ include "ccm.app-folder" . }}/logs
      {{- end }}
      {{- end }}
      {{- end }}
      {{ if .Values.ssl.enabled }}
            - name: ssl-conf
              mountPath: {{ include "ccm.app-folder" . }}/data/ssl
      {{- end }}
      {{ if .Values.persistence.connectOption.ccm }}
            - name: oracle-secure
              mountPath: /opt/tmp/oracle
      {{- end }}
      {{ if .Values.keycloak.enabled }}
      {{ if .Values.keycloak.jsonFile.enabled }}
            - name: keycloak-confmap
              mountPath: {{ include "ccm.app-folder" . }}/share/keycloak
      {{- end }}
      {{- end }}
          resources:
            {{- toYaml .Values.search.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.persistence.enabled }}
{{- if .Values.persistence.search.enabled }}
  volumeClaimTemplates:
{{- if .Values.persistence.search.data.enabled }}
  - metadata:
      name: data
      labels:
        app.kubernetes.io/name: {{ include "ccm.name" . }}-search
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
    {{- with .Values.search.annotations  }}
      annotations:
{{ toYaml . | indent 8 }}
    {{- end }}
    spec:
      accessModes:
      {{ toYaml .Values.persistence.search.data.accessModes | indent 4 }}
{{- if .Values.persistence.search.storageClass }}
      storageClassName: '{{ .Values.persistence.search.storageClass }}'
{{- else if .Values.persistence.storageClass }}
      storageClassName: '{{ .Values.persistence.storageClass }}'
{{- else if .Values.global.persistence.rwoStorageClass }}
      storageClassName: {{ .Values.global.persistence.rwoStorageClass | quote }}
{{- else if .Values.global.persistence.rwxStorageClass }}
      storageClassName: {{ .Values.global.persistence.rwxStorageClass | quote }}
{{- end }}
      resources:
        requests:
          storage: "{{ .Values.persistence.search.data.size }}"
{{- end }}

{{- if .Values.persistence.search.logs.enabled }}
  - metadata:
      name: logs
      labels:
        app.kubernetes.io/name: {{ include "ccm.name" . }}-search
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
    {{- with .Values.search.annotations  }}
      annotations:
{{ toYaml . | indent 8 }}
    {{- end }}
    spec:
      accessModes:
      {{ toYaml .Values.persistence.search.logs.accessModes | indent 4 }}
{{- if .Values.persistence.search.storageClass }}
      storageClassName: '{{ .Values.persistence.search.storageClass }}'
{{- else if .Values.persistence.storageClass }}
      storageClassName: '{{ .Values.persistence.storageClass }}'
{{- else if .Values.global.persistence.rwoStorageClass }}
      storageClassName: {{ .Values.global.persistence.rwoStorageClass | quote }}
{{- else if .Values.global.persistence.rwxStorageClass }}
      storageClassName: {{ .Values.global.persistence.rwxStorageClass | quote }}
{{- end }}
      resources:
        requests:
          storage: "{{ .Values.persistence.search.logs.size }}"
{{- end }}
{{- end }}
{{- end }}
{{- end }}
