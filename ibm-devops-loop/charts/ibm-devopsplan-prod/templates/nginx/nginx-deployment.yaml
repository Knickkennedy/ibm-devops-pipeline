{{- if .Values.nginx.service -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ccm.fullname" . }}-nginx
  labels:
    {{- include "ccm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.nginx.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ccm.name" . }}-nginx
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/managed-by: {{ .Release.Service }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ccm.name" . }}-nginx
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
      annotations:
  {{- if eq "IBM" .Values.global.devopsPlanBrand }}
        productName: {{ .Values.annotations.ibm.productName }}
        productID: {{ .Values.annotations.ibm.productID }}
        productVersion: {{ .Values.annotations.ibm.productVersion }}
        productMetric: {{ .Values.annotations.ibm.productMetric }}
        productChargedContainers: {{ .Values.annotations.ibm.productChargedContainers }}
  {{ else }}
        productName: {{ .Values.annotations.hcl.productName }}
        productVersion: {{ .Values.annotations.hcl.productVersion }}
  {{- end }}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: {{ .Values.nginx.nodeAffinity.key }}
                operator: In
                values:
                - {{ .Values.nginx.nodeAffinity.values }}
  {{- if .Values.nginx.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.nginx.topologySpreadConstraints.maxSkew }}
          topologyKey: {{ .Values.nginx.topologySpreadConstraints.topologyKey }}
          whenUnsatisfiable: {{ .Values.nginx.topologySpreadConstraints.whenUnsatisfiable }}
          labelSelector:
            matchLabelKeys:
              app.kubernetes.io/name: {{ include "ccm.name" . }}-nginx
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- end }}
  {{- if or (.Values.global.imagePullSecret) (.Values.global.imagePullSecrets) }}
      imagePullSecrets:
  {{- if .Values.global.imagePullSecret }}
      - name: {{ .Values.global.imagePullSecret }}
  {{- end }}
      {{- range .Values.global.imagePullSecrets }}
      - name: {{ . }}
      {{- end }}
  {{- end }}
      securityContext:
        runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
  {{- end }}
      {{- if .Values.global.platform.enabled }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "ccm.fullname" . }}-nginx-configmap
      {{- end }}
      initContainers:
      {{- if .Values.dashboards.service }}
        - name: init-dashboards
          image: busybox:1.28
          env:
          - name: dashboardsservice
            value: {{ include "ccm.fullname" . }}-dashboards
          command: ['sh', '-c', "until nc -vz $(dashboardsservice) 5601; do echo waiting for $(dashboardsservice); sleep 2; done"]
      {{- if .Values.ccm.initResources }}
          resources: {{- toYaml .Values.ccm.initResources | nindent 12 }}
      {{- end }}
          securityContext:
            runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
##            fsGroup: {{ .Values.securityContext.fsGroup }}
  {{- end }}
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
      {{- end }}
      {{- if .Values.opensearch.service }}
        - name: init-opensearch
          image: busybox:1.28
          env:
          - name: opensearchservice
            value: {{ include "ccm.fullname" . }}-opensearch
          command: ['sh', '-c', "until nc -vz $(opensearchservice) 9200; do echo waiting for $(opensearchservice); sleep 2; done"]
      {{- if .Values.ccm.initResources }}
          resources: {{- toYaml .Values.ccm.initResources | nindent 12 }}
      {{- end }}
          securityContext:
            runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
##            fsGroup: {{ .Values.securityContext.fsGroup }}
  {{- end }}
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
      {{- end }}
      hostname:  "{{ .Values.nginx.hostname }}"
      serviceAccount: {{ include "ccm.fullname" . }}-sa
      containers:
      - name: {{ .Chart.Name }}-nginx
        ## image: twalter/openshift-nginx
        ## image: bitnami/nginx
      {{- if .Values.image.repoDigests }}
        image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.nginx.image.repository }}@{{ .Values.nginx.image.tag }}"
      {{- else }}
        image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
      {{- end }}  
        imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
      {{- if .Values.probes.readiness.nginx }}
        readinessProbe:
{{ toYaml .Values.probes.readiness.nginx | indent 10 }}
      {{- end }}
      {{- if .Values.probes.liveness.nginx }}
        livenessProbe:
{{ toYaml .Values.probes.liveness.nginx | indent 10 }}
      {{- end }}
      {{- if semverCompare ">=1.16-0" .Capabilities.KubeVersion.Version }}
      {{- if .Values.probes.startup.nginx }}
        startupProbe:
{{ toYaml .Values.probes.startup.nginx | indent 10 }}
      {{- end }}
      {{- end }}
        securityContext:
          privileged: false
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
          - name: http
            containerPort: 8081
            protocol: TCP
          - name: https
            containerPort: 5602
            protocol: TCP
          - name: http2
            containerPort: 5603
            protocol: TCP
          - name: https3
            containerPort: 8191
            protocol: TCP
        env:
          - name: NGINX_SERVER_NAME
            value: {{ include "ccm.fullname" . }}-nginx
          - name: DASHBOARDS_HOSTS
            value: https://{{ include "ccm.fullname" . }}-dashboards:5601
          - name: CCM_HOSTS
            value: https://{{ include "ccm.fullname" . }}:8190
      {{- if .Values.global.platform.enabled }}
        volumeMounts:
          - name: nginx-config
            mountPath: /etc/nginx/nginx.conf
            subPath: nginx.conf
      {{- end }}
        resources:
          {{- toYaml .Values.nginx.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
