{{- if .Values.devopsplan.service }}
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "ccm.fullname" . }}
  labels:
    {{- include "ccm.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ccm.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: {{ include "ccm.fullname" . }}
{{- end -}}
