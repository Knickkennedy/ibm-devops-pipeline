{{- if .Values.dashboards.service -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ccm.fullname" . }}-dashboards
  labels:
    {{- include "ccm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboards.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ccm.name" . }}-dashboards
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/managed-by: {{ .Release.Service }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ccm.name" . }}-dashboards
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
      annotations:
  {{- if eq "IBM" .Values.global.devopsPlanBrand }}
        productName: {{ .Values.annotations.ibm.productName }}
        productID: {{ .Values.annotations.ibm.productID }}
        productVersion: {{ .Values.annotations.ibm.productVersion }}
        productMetric: {{ .Values.annotations.ibm.productMetric }}
        productChargedContainers: {{ .Values.annotations.ibm.productChargedContainers }}
  {{ else }}
        productName: {{ .Values.annotations.hcl.productName }}
        productVersion: {{ .Values.annotations.hcl.productVersion }}
  {{- end }}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: {{ .Values.dashboards.nodeAffinity.key }}
                operator: In
                values:
                - {{ .Values.dashboards.nodeAffinity.values }}
  {{- if .Values.dashboards.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.dashboards.topologySpreadConstraints.maxSkew }}
          topologyKey: {{ .Values.dashboards.topologySpreadConstraints.topologyKey }}
          whenUnsatisfiable: {{ .Values.dashboards.topologySpreadConstraints.whenUnsatisfiable }}
          labelSelector:
            matchLabelKeys:
              app.kubernetes.io/name: {{ include "ccm.name" . }}-dashboards
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- end }}
  {{- if or (.Values.global.imagePullSecret) (.Values.global.imagePullSecrets) }}
      imagePullSecrets:
  {{- if .Values.global.imagePullSecret }}
      - name: {{ .Values.global.imagePullSecret }}
  {{- end }}
      {{- range .Values.global.imagePullSecrets }}
      - name: {{ . }}
      {{- end }}
  {{- end }}
      securityContext:
        runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
  {{- end }}
      volumes:
  {{ if .Values.dashboards.configFile.enabled }}
        - name: dashboards-config
          configMap:
            name: "{{ .Values.dashboards.configFile.configMapName }}"
  {{- end }}
  {{- if .Values.global.platform.enabled }}
        - name: opensearch-dashboards-temp
          configMap:
            name: {{ include "ccm.fullname" . }}-dashboards-configmap
        - name: opensearch-dashboards
          emptyDir: {}
  {{- if eq (include "mychart.caCertExists" .) "true" }}
        - name: tls-secrets
          secret:
      {{- if eq "IBM" .Values.global.devopsPlanBrand }}
            secretName: {{ .Values.global.ibmCertSecretName }}
      {{- else }}
            secretName: {{ .Values.global.hclCertSecretName }}
      {{- end }}
            items:
              - key: ca.crt
                path: devops_loop.pem
  {{- end }}
  {{- end }}
      initContainers:
      {{- if .Values.global.platform.enabled }}
        - name: init-dashboards
      {{- if .Values.image.repoDigests }}
          image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.dashboards.image.repository }}@{{ .Values.dashboards.image.tag }}"
      {{- else }}
          image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.dashboards.image.repository }}:{{ .Values.dashboards.image.tag }}"
      {{- end }}
          imagePullPolicy: {{ .Values.dashboards.image.pullPolicy }}
          command:
            - /bin/sh
            - '-c'
            - |
                cp /tmp/config/opensearch_dashboards.yml /usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
                /usr/share/opensearch-dashboards/config.sh
          env:
            - name: OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "ccm.fullname" . }}-opensearch
                  key: oauth-client-secret
          volumeMounts:
          - name: opensearch-dashboards-temp
            mountPath: /tmp/config
            readOnly: false
          - name: opensearch-dashboards
            mountPath: /usr/share/opensearch-dashboards/config
            readOnly: false
          securityContext:
            runAsNonRoot: true
      {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
      {{- end }}
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
      {{- end }}
      {{- if .Values.opensearch.service }}
        - name: init-opensearch
          image: busybox:1.28
          env:
          - name: opensearchservice
            value: {{ include "ccm.fullname" . }}-opensearch
          command: ['sh', '-c', "until nc -vz $(opensearchservice) 9200; do echo waiting for $(opensearchservice); sleep 2; done"]
      {{- if .Values.ccm.initResources }}
          resources: {{- toYaml .Values.ccm.initResources | nindent 12 }}
      {{- end }}
      {{- end }}
          securityContext:
            runAsNonRoot: true
  {{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
##            fsGroup: {{ .Values.securityContext.fsGroup }}
  {{- end }}
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
      hostname:  "{{ .Values.dashboards.hostname }}"
      serviceAccount: {{ include "ccm.fullname" . }}-sa
      containers:
      - name: {{ .Chart.Name }}-dashboards
      {{- if .Values.image.repoDigests }}
        image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.dashboards.image.repository }}@{{ .Values.dashboards.image.tag }}"
      {{- else }}
        image: "{{ include "ccm.ccmImageRepo" . }}/{{ .Values.dashboards.image.repository }}:{{ .Values.dashboards.image.tag }}"
      {{- end }}
        imagePullPolicy: {{ .Values.dashboards.image.pullPolicy }}
        {{- if .Values.probes.readiness.dashboards }}
        readinessProbe:
{{ toYaml .Values.probes.readiness.dashboards | indent 10 }}
        {{- end }}
        {{- if .Values.probes.liveness.dashboards }}
        livenessProbe:
{{ toYaml .Values.probes.liveness.dashboards | indent 10 }}
        {{- end }}
      {{- if semverCompare ">=1.16-0" .Capabilities.KubeVersion.Version }}
      {{- if .Values.probes.startup.dashboards }}
        startupProbe:
{{ toYaml .Values.probes.startup.dashboards | indent 10 }}
      {{- end }}
      {{- end }}
        securityContext:
            privileged: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
        ports:
          - name: http
            containerPort: 5601
            protocol: TCP
        env:
          - name: OPENSEARCH_URL
            value: https://{{ include "ccm.fullname" . }}-opensearch:9200
          - name: OPENSEARCH_HOSTS
            value: https://{{ include "ccm.fullname" . }}-opensearch:9200
      {{- if .Values.opensearch.username  }}
          - name: OPENSEARCH_USERNAME
            value: {{ .Values.opensearch.username }}
          - name: OPENSEARCH_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "ccm.fullname" . }}-opensearch
                key: opensearch-password
      {{- end }}
      {{- if .Values.global.platform.enabled }}
          - name: SERVER_BASEPATH
            value: '{{ .Values.dashboards.basePath }}'
          - name: SERVER_REWRITEBASEPATH
            value: 'true'
      {{- end }}
        volumeMounts:
      {{ if .Values.dashboards.configFile.enabled }}
          - name: dashboards-config
            mountPath: /usr/share/opensearch-dashboards/config
      {{- end }}
      {{- if .Values.global.platform.enabled }}
         - name: opensearch-dashboards
           mountPath: /usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
           subPath: opensearch_dashboards.yml
      {{- if eq (include "mychart.caCertExists" .) "true" }}
         - name: tls-secrets
           mountPath: /usr/share/opensearch-dashboards/config/devops_loop.pem
           subPath: devops_loop.pem
      {{- end }}
      {{- end }}
        resources:
          {{- toYaml .Values.dashboards.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
