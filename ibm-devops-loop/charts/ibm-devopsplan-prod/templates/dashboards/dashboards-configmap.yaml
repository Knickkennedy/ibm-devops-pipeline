{{- if .Values.dashboards.service -}}
{{- if .Values.keycloak.service -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ccm.fullname" . }}-dashboards-configmap
  labels:
    {{- include "ccm.labels" . | nindent 4 }}
data:
  opensearch_dashboards.yml: |-
    opensearch.hosts: [https://localhost:9200]
    opensearch.ssl.verificationMode: none
    opensearch.username: kibanaserver
    opensearch.password: kibanaserver
    opensearch.requestHeadersWhitelist: [authorization, securitytenant]

    opensearch_security.multitenancy.enabled: true
    opensearch_security.multitenancy.tenants.enable_global: true
    opensearch_security.multitenancy.tenants.enable_private: true
    opensearch_security.multitenancy.tenants.preferred: [Private, Global]
    opensearch_security.readonly_mode.roles: [kibana_read_only]
    # Use this setting if you are running opensearch-dashboards without https
    opensearch_security.cookie.secure: false
    server.host: '0.0.0.0'

    server.ssl.enabled: true
    server.ssl.certificate: /usr/share/opensearch-dashboards/config/opensearch.dashboards.cert
    server.ssl.key: /usr/share/opensearch-dashboards/config/opensearch.dashboards.key

    #OpenID authentication - keycloak
    opensearch_security.auth.type: "openid"
    opensearch_security.openid.connect_url: "https://{{ .Values.global.domain }}/auth/realms/{{ .Values.keycloak.realmName }}/.well-known/openid-configuration"
    opensearch_security.openid.client_id: "{{ .Values.platform.opensearch.oidc.clientId }}"
{{- if eq (include "mychart.caCertExists" .) "true" }}
    opensearch_security.openid.root_ca: "/usr/share/opensearch-dashboards/config/devops_loop.pem"
{{- end }}
    opensearch_security.openid.client_secret: ""
    opensearch_security.openid.base_redirect_url: https://{{ .Values.global.domain }}{{ .Values.dashboards.basePath }}
    opensearch_security.openid.scope: "openid profile email"
{{- end -}}
{{- end -}}
