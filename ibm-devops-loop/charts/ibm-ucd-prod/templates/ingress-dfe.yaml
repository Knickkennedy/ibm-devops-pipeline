{{- if not (.Capabilities.APIVersions.Has "route.openshift.io/v1") }}
{{- if not (.Capabilities.APIVersions.Has "getambassador.io/v2") }}
{{- include "sch.config.init" (list . "ibm-ucd-prod.sch.chart.config.values") -}}
{{- $fullName := include "sch.names.fullName" (list .) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-dfe
  labels:
{{ include "sch.metadata.labels.standard" (list . "ing") | indent 4 }}
  annotations: 
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    {{- if .Values.secureConnections.required }}
    # The NGINX ingress annotations contains a new prefix nginx.ingress.kubernetes.io.
    # To avoid breaking a running NGINX ingress controller, specify both new and old prefixes.
    ingress.kubernetes.io/ssl-passthrough: "true"
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    ingress.kubernetes.io/secure-backends: "true"
    nginx.ingress.kubernetes.io/secure-backends: "true" 
    {{- end }}
spec: 
  rules:
{{- if .Values.ingress.dfehost }}
  - host: {{ .Values.ingress.dfehost }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ $fullName }}-dfe
            port:
              {{- if .Values.secureConnections.required }}
              number: 8443
              {{- else }}
              number: 8080
              {{- end }}
{{- else }}
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ $fullName }}-dfe
            port:
              {{- if .Values.secureConnections.required }}
              number: 8443
              {{- else }}
              number: 8080
              {{- end }}
{{- end }}
{{- end }}
{{- end }}
