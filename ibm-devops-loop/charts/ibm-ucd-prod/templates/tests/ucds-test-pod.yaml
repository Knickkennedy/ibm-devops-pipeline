{{- include "sch.config.init" (list . "ibm-ucd-prod.sch.chart.config.values") -}}
{{- $fullName := include "sch.names.fullName" (list .) -}}
{{- $helmTest := default "enabled" .Values.helmTestOverride }}
{{- $imageSpec := include "{{ .Chart.Name }}.imageSpec" . | trim -}}
{{- if ne $helmTest "disabled" }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ $fullName }}-wget-test"
  labels:
{{ include "sch.metadata.labels.standard" (list . "") | indent 4 }}
    type: "test"
  annotations:
    helm.sh/hook: test-success
    helm.sh/hook-delete-policy: hook-succeeded
    productMetric: "MANAGED_VIRTUAL_SERVER"
spec:
  serviceAccountName: "{{ $fullName }}"
  affinity:
  {{- include "sch.affinity.nodeAffinity" (list .) | indent 4 }}
  hostNetwork: false
  hostPID: false
  hostIPC: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
  containers:
    - name: "{{ $fullName }}-wget-test"
      image: {{ $imageSpec | quote }}
      securityContext:
        privileged: false
        readOnlyRootFilesystem: false
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        runAsUser: 1001
        capabilities:
          drop:
          - ALL
      resources:
        {{- if .Values.resources.constraints.enabled}}
        limits:
{{ toYaml .Values.resources.limits | indent 10 }}
        requests:
{{ toYaml .Values.resources.requests | indent 10 }}
        {{- end }}
      {{- if eq (((.Values.global).platform).enabled) (true) }}
      command: ["sh", "-c", "wget --no-check-certificate https://{{ $fullName }}:8443{{ .Values.ingress.path }}/connTest.txt -O -"]
      {{- else }}
      command: ["sh", "-c", "wget --no-check-certificate https://{{ $fullName }}:8443/connTest.txt -O -"]
      {{- end }}
  imagePullSecrets:
  - name: ibm-entitlement-key
  {{- if .Values.image.secret }}
  - name: {{ .Values.image.secret }}
  {{- end }}
  restartPolicy: Never
{{- end }}
